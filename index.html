<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>CGV-WEB | Interactive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
        }
        
        /* Hardware Acceleration Codes */
        #canvas-container {
            width: 100vw;
            height: 100vh;
            transform: translateZ(0); 
            -webkit-transform: translateZ(0);
            will-change: transform; 
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden;
        }
        
        #header {
            position: absolute;
            top: 30px;
            left: 30px;
            color: #e0e0e0;
            font-weight: 600;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.9;
            pointer-events: none;
        }
        
        #controls {
            position: absolute;
            top: 30px;
            right: 30px;
            background: rgba(16, 20, 31, 0.85);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid rgba(100, 200, 255, 0.15);
            color: #e0e0e0;
            min-width: 280px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            user-select: none;
        }
        
        .control-group {
            margin-bottom: 20px;
        }
        
        .control-group:last-child {
            margin-bottom: 0;
        }
        
        label {
            display: block;
            margin-bottom: 12px;
            font-size: 11px;
            font-weight: 500;
            color: #8892b0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        #slice-slider {
            width: 100%;
            height: 4px;
            border-radius: 2px;
            background: rgba(100, 200, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        
        #slice-slider:hover {
            background: rgba(100, 200, 255, 0.15);
        }
        
        #slice-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: linear-gradient(135deg, #64c8ff 0%, #4a9eff 100%);
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(100, 200, 255, 0.4);
            transition: all 0.2s ease;
        }
        
        #slice-slider::-webkit-slider-thumb:hover {
            transform: scale(1.15);
            box-shadow: 0 3px 12px rgba(100, 200, 255, 0.6);
        }
        
        #cube-count {
            color: #64c8ff;
            font-weight: 600;
            font-size: 20px;
            letter-spacing: 0.5px;
        }
        
        #tooltip {
            position: absolute;
            background: rgba(100, 200, 255, 0.95);
            color: #0f0f1a;
            padding: 8px 14px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            pointer-events: none;
            display: none;
            z-index: 1000;
            box-shadow: 0 4px 12px rgba(100, 200, 255, 0.3);
            letter-spacing: 0.5px;
        }

        /* Color Palette Styles */
        #color-palette {
            position: absolute;
            background: rgba(16, 20, 31, 0.95);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(100, 200, 255, 0.2);
            padding: 10px;
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95);
            transition: opacity 0.2s ease, transform 0.2s ease;
            z-index: 2000;
        }

        #color-palette.active {
            opacity: 1;
            pointer-events: all;
            transform: scale(1);
        }

        .color-swatch {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.1s ease, border 0.1s ease;
            border: 2px solid transparent;
        }

        .color-swatch:hover {
            transform: scale(1.1);
            border-color: #fff;
        }
        
        #instructions {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(16, 20, 31, 0.85);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(100, 200, 255, 0.15);
            color: #8892b0;
            font-size: 11px;
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            line-height: 1.6;
            pointer-events: none;
        }
        
        #instructions div {
            margin-bottom: 6px;
        }
        
        #instructions div:last-child {
            margin-bottom: 0;
        }
        
        #instructions strong {
            color: #e0e0e0;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div id="header">CGV-WEB</div>
    
    <div id="controls">
        <div class="control-group">
            <label for="slice-slider">Cube Density (Step: 10k)</label>
            <input type="range" id="slice-slider" min="0" max="100" value="0" step="5">
        </div>
        <div class="control-group">
            <label>Active Cubes</label>
            <div id="cube-count">0</div>
        </div>
    </div>
    
    <div id="tooltip"></div>

    <div id="color-palette">
        <div class="color-swatch" style="background: #ff5e57;" data-color="0xff5e57"></div>
        <div class="color-swatch" style="background: #ffc048;" data-color="0xffc048"></div>
        <div class="color-swatch" style="background: #0be881;" data-color="0x0be881"></div>
        <div class="color-swatch" style="background: #4bcffa;" data-color="0x4bcffa"></div>
        <div class="color-swatch" style="background: #575fcf;" data-color="0x575fcf"></div>
        <div class="color-swatch" style="background: #ef5777;" data-color="0xef5777"></div>
        <div class="color-swatch" style="background: #808e9b;" data-color="0x808e9b"></div>
        <div class="color-swatch" style="background: #d2dae2;" data-color="0xd2dae2"></div>
        <div class="color-swatch" style="background: #1e272e;" data-color="0x1e272e"></div>
    </div>
    
    <div id="instructions">
        <div><strong>Navigation</strong></div>
        <div>• Left Mouse — Rotate</div>
        <div>• Right Mouse — Pan</div>
        <div>• Scroll — Zoom (Slow/Deep)</div>
        <div>• Click — Change Cube Color</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0f0f1a);
        scene.fog = new THREE.Fog(0x0f0f1a, 15, 30);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(5, 3, 7);
        
        const renderer = new THREE.WebGLRenderer({ 
            antialias: true,
            powerPreference: "high-performance",
            alpha: false
        });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        // Lighting
        const ambientLight = new THREE.AmbientLight(0x404870, 0.4);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0x88b8ff, 1.2);
        mainLight.position.set(8, 6, 5);
        mainLight.castShadow = true;
        scene.add(mainLight);
        
        const fillLight = new THREE.DirectionalLight(0xff9966, 0.3);
        fillLight.position.set(-5, 2, -3);
        scene.add(fillLight);
        
        const rimLight = new THREE.DirectionalLight(0x6699ff, 0.6);
        rimLight.position.set(-3, -4, 8);
        scene.add(rimLight);
        
        // Cylinder parameters
        const OUTER_RADIUS = 2.0;
        const INNER_RADIUS = 0.8;
        const CYLINDER_LENGTH = 6;
        const MAX_CUBES = 200000;
        const GAP_FACTOR = 0.82;
        
        const pivotGroup = new THREE.Group();
        scene.add(pivotGroup);
        
        // Hollow cylinder base
        const hollowCylinderGroup = new THREE.Group();
        const outerGeo = new THREE.CylinderGeometry(OUTER_RADIUS, OUTER_RADIUS, CYLINDER_LENGTH, 64, 1, true);
        const innerGeo = new THREE.CylinderGeometry(INNER_RADIUS, INNER_RADIUS, CYLINDER_LENGTH, 64, 1, true);
        
        const material = new THREE.MeshPhongMaterial({ 
            color: 0x5a9fd4,
            shininess: 90,
            side: THREE.DoubleSide,
            transparent: true,
            opacity: 0.95
        });
        
        const outerCyl = new THREE.Mesh(outerGeo, material);
        const innerCyl = new THREE.Mesh(innerGeo, material);
        outerCyl.rotation.z = Math.PI / 2;
        innerCyl.rotation.z = Math.PI / 2;
        
        const capShape = new THREE.Shape();
        capShape.absarc(0, 0, OUTER_RADIUS, 0, Math.PI * 2, false);
        const holePath = new THREE.Path();
        holePath.absarc(0, 0, INNER_RADIUS, 0, Math.PI * 2, true);
        capShape.holes.push(holePath);
        
        const capGeo = new THREE.ShapeGeometry(capShape);
        const capLeft = new THREE.Mesh(capGeo, material);
        const capRight = new THREE.Mesh(capGeo, material);
        capLeft.position.x = -CYLINDER_LENGTH / 2;
        capLeft.rotation.y = Math.PI / 2;
        capRight.position.x = CYLINDER_LENGTH / 2;
        capRight.rotation.y = -Math.PI / 2;
        
        hollowCylinderGroup.add(outerCyl, innerCyl, capLeft, capRight);
        pivotGroup.add(hollowCylinderGroup);
        
        // --- HIGHLIGHT SYSTEM ---
        // Helper mesh for the outline effect
        const highlightGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(1, 1, 1));
        const highlightMat = new THREE.LineBasicMaterial({ color: 0xffffff, linewidth: 2 });
        const highlightMesh = new THREE.LineSegments(highlightGeo, highlightMat);
        highlightMesh.visible = false;
        highlightMesh.matrixAutoUpdate = false; // We will copy matrix from instance
        pivotGroup.add(highlightMesh);

        // Cube system
        let cubesGroup = null;
        let instancedMesh = null;
        let currentCubeCount = 0;
        
        // Use White for base material so we can tint instances correctly
        const cubeGeometry = new THREE.BoxGeometry(1, 1, 1);
        const cubeMaterial = new THREE.MeshPhongMaterial({ 
            color: 0xffffff, // White to allow tinting
            shininess: 90,
            specular: 0x888888
        });

        // Default cube color
        const DEFAULT_COLOR = new THREE.Color(0x5a9fd4);
        
        function calculateGridDimensions(totalCubes) {
            const volume = Math.PI * (OUTER_RADIUS * OUTER_RADIUS - INNER_RADIUS * INNER_RADIUS) * CYLINDER_LENGTH;
            const volumePerCube = volume / totalCubes;
            const cubeSize = Math.pow(volumePerCube, 1/3);
            
            const radialDivs = Math.max(1, Math.round((OUTER_RADIUS - INNER_RADIUS) / cubeSize));
            const axialDivs = Math.max(1, Math.round(CYLINDER_LENGTH / cubeSize));
            const avgRadius = (OUTER_RADIUS + INNER_RADIUS) / 2;
            const circumference = 2 * Math.PI * avgRadius;
            const angularDivs = Math.max(3, Math.round(circumference / cubeSize));
            
            return { radialDivs, angularDivs, axialDivs, cubeSize };
        }
        
        function createCubes(count) {
            // Cleanup
            if (cubesGroup) {
                pivotGroup.remove(cubesGroup);
                if (instancedMesh) {
                    instancedMesh.geometry.dispose();
                    instancedMesh.material.dispose();
                }
            }
            
            // Hide highlight when regenerating
            highlightMesh.visible = false;

            if (count === 0) {
                cubesGroup = null;
                currentCubeCount = 0;
                hollowCylinderGroup.visible = true;
                return;
            }
            
            hollowCylinderGroup.visible = false;
            
            // Generate Positions
            const { radialDivs, angularDivs, axialDivs, cubeSize } = calculateGridDimensions(count);
            const positions = [];
            const actualCubeSize = cubeSize * GAP_FACTOR;
            
            for (let x = 0; x < axialDivs; x++) {
                const xPos = (x / axialDivs - 0.5) * CYLINDER_LENGTH;
                for (let r = 0; r < radialDivs; r++) {
                    const radius = INNER_RADIUS + (r + 0.5) * (OUTER_RADIUS - INNER_RADIUS) / radialDivs;
                    for (let a = 0; a < angularDivs; a++) {
                        if (positions.length >= count) break;
                        const angle = (a / angularDivs) * Math.PI * 2;
                        positions.push({
                            x: xPos,
                            y: Math.cos(angle) * radius,
                            z: Math.sin(angle) * radius,
                            size: actualCubeSize
                        });
                    }
                    if (positions.length >= count) break;
                }
                if (positions.length >= count) break;
            }
            
            currentCubeCount = positions.length;
            
            // Create Mesh
            cubesGroup = new THREE.Group();
            instancedMesh = new THREE.InstancedMesh(cubeGeometry, cubeMaterial, currentCubeCount);
            instancedMesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);
            
            const matrix = new THREE.Matrix4();
            
            // Initialize positions and default colors
            for (let i = 0; i < currentCubeCount; i++) {
                const cube = positions[i];
                matrix.makeScale(cube.size, cube.size, cube.size);
                matrix.setPosition(cube.x, cube.y, cube.z);
                instancedMesh.setMatrixAt(i, matrix);
                instancedMesh.setColorAt(i, DEFAULT_COLOR);
            }
            
            instancedMesh.instanceMatrix.needsUpdate = true;
            instancedMesh.instanceColor.needsUpdate = true;
            cubesGroup.add(instancedMesh);
            pivotGroup.add(cubesGroup);
        }
        
        // Camera Controls
        const controls = {
            target: new THREE.Vector3(0, 0, 0),
            spherical: {
                radius: 7,
                theta: Math.atan2(5, 7),
                phi: Math.acos(3 / Math.sqrt(5*5 + 3*3 + 7*7))
            },
            velocity: { theta: 0, phi: 0, pan: new THREE.Vector2(0, 0), zoom: 0 },
            damping: 0.92,
            rotationSpeed: 0.003,
            panSpeed: 0.003,
            zoomSpeed: 0.002
        };
        
        let isDragging = false;
        let isPanning = false;
        let previousMousePosition = { x: 0, y: 0 };
        
        // Input Handling
        renderer.domElement.addEventListener('mousedown', (e) => {
            if(e.button !== 0 && e.button !== 2) return;
            isDragging = true;
            isPanning = e.button === 2;
            previousMousePosition = { x: e.clientX, y: e.clientY };
            // Close palette on interaction
            closePalette();
        });
        
        renderer.domElement.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const deltaX = e.clientX - previousMousePosition.x;
                const deltaY = e.clientY - previousMousePosition.y;
                
                if (isPanning) {
                    controls.velocity.pan.x = deltaX * controls.panSpeed;
                    controls.velocity.pan.y = deltaY * controls.panSpeed;
                } else {
                    controls.velocity.theta = -deltaX * controls.rotationSpeed;
                    controls.velocity.phi = -deltaY * controls.rotationSpeed;
                }
                previousMousePosition = { x: e.clientX, y: e.clientY };
            }
            
            handleMouseMove(e);
        });
        
        renderer.domElement.addEventListener('mouseup', () => {
            isDragging = false;
            isPanning = false;
        });
        
        renderer.domElement.addEventListener('contextmenu', (e) => e.preventDefault());
        
        renderer.domElement.addEventListener('wheel', (e) => {
            e.preventDefault();
            controls.velocity.zoom = e.deltaY * controls.zoomSpeed;
            closePalette();
        });

        // Click Handler for Palette
        renderer.domElement.addEventListener('click', (e) => {
            // Only handle left click and if not dragging
            if (e.button !== 0) return;
            // Simple check to differentiate click vs drag
            // (In a full app, measure distance/time)
            
            handleMouseClick(e);
        });

        function updateCamera() {
            controls.velocity.theta *= controls.damping;
            controls.velocity.phi *= controls.damping;
            controls.velocity.pan.multiplyScalar(controls.damping);
            controls.velocity.zoom *= controls.damping;
            
            controls.spherical.theta += controls.velocity.theta;
            controls.spherical.phi += controls.velocity.phi;
            controls.spherical.phi = Math.max(0.1, Math.min(Math.PI - 0.1, controls.spherical.phi));
            
            controls.spherical.radius += controls.velocity.zoom;
            controls.spherical.radius = Math.max(0.1, Math.min(40, controls.spherical.radius));
            
            const right = new THREE.Vector3();
            const up = new THREE.Vector3();
            camera.getWorldDirection(right);
            right.cross(camera.up).normalize();
            up.copy(camera.up);
            
            controls.target.add(right.multiplyScalar(-controls.velocity.pan.x));
            controls.target.add(up.multiplyScalar(controls.velocity.pan.y));
            
            const sinPhiRadius = Math.sin(controls.spherical.phi) * controls.spherical.radius;
            camera.position.x = sinPhiRadius * Math.sin(controls.spherical.theta) + controls.target.x;
            camera.position.y = Math.cos(controls.spherical.phi) * controls.spherical.radius + controls.target.y;
            camera.position.z = sinPhiRadius * Math.cos(controls.spherical.theta) + controls.target.z;
            
            camera.lookAt(controls.target);
        }
        
        // Raycasting and UI
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const tooltip = document.getElementById('tooltip');
        const palette = document.getElementById('color-palette');
        
        let hoveredInstanceId = -1;
        let selectedInstanceId = -1;

        function handleMouseMove(event) {
            if (!instancedMesh || currentCubeCount === 0) {
                tooltip.style.display = 'none';
                highlightMesh.visible = false;
                hoveredInstanceId = -1;
                return;
            }
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(instancedMesh);
            
            if (intersects.length > 0) {
                const instanceId = intersects[0].instanceId;
                hoveredInstanceId = instanceId;

                // Tooltip
                tooltip.textContent = `CUBE #${instanceId}`;
                tooltip.style.display = 'block';
                tooltip.style.left = event.clientX + 15 + 'px';
                tooltip.style.top = event.clientY + 15 + 'px';

                // Highlight Outline
                const matrix = new THREE.Matrix4();
                instancedMesh.getMatrixAt(instanceId, matrix);
                highlightMesh.visible = true;
                highlightMesh.matrix.copy(matrix); // Copy transform exactly
                
            } else {
                hoveredInstanceId = -1;
                tooltip.style.display = 'none';
                highlightMesh.visible = false;
            }
        }

        function handleMouseClick(event) {
            if (hoveredInstanceId !== -1) {
                selectedInstanceId = hoveredInstanceId;
                openPalette(event.clientX, event.clientY);
            } else {
                closePalette();
            }
        }

        // Palette Logic
        function openPalette(x, y) {
            // Keep palette within bounds
            const width = 140; // approx width
            const height = 140; 
            
            let posX = x + 10;
            let posY = y + 10;

            if (posX + width > window.innerWidth) posX = x - width - 10;
            if (posY + height > window.innerHeight) posY = y - height - 10;

            palette.style.left = `${posX}px`;
            palette.style.top = `${posY}px`;
            palette.classList.add('active');
        }

        function closePalette() {
            palette.classList.remove('active');
            selectedInstanceId = -1;
        }

        // Color Swatch Selection
        document.querySelectorAll('.color-swatch').forEach(swatch => {
            swatch.addEventListener('click', (e) => {
                e.stopPropagation(); // Prevent closing immediately
                if (selectedInstanceId !== -1 && instancedMesh) {
                    const hexStr = swatch.getAttribute('data-color');
                    const color = new THREE.Color(parseInt(hexStr));
                    
                    instancedMesh.setColorAt(selectedInstanceId, color);
                    instancedMesh.instanceColor.needsUpdate = true;
                    
                    closePalette();
                }
            });
        });

        // Slider Logic
        const slider = document.getElementById('slice-slider');
        const cubeCountLabel = document.getElementById('cube-count');
        
        slider.addEventListener('input', (e) => {
            const value = parseFloat(e.target.value);
            const newTarget = Math.floor((value / 100) * MAX_CUBES);
            
            if (newTarget !== currentCubeCount) {
                cubeCountLabel.textContent = newTarget.toLocaleString();
                closePalette(); // Close if open
                createCubes(newTarget);
            }
        });
        
        // Animation
        function animate() {
            requestAnimationFrame(animate);
            updateCamera();
            renderer.render(scene, camera);
        }
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        animate();
    </script>
</body>
</html>
