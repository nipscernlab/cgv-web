<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CGV — ATLAS Calorimeter Viewer</title>
  <link rel="icon" type="image/svg+xml" href="./assets/cgvweb_icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
    }
  }
  </script>
  <style>
    /* ── Variables ───────────────────────────────────────── */
    :root {
      --bg:     #01192e;
      --panel:  rgba(1, 20, 45, 0.78);
      --border: rgba(40, 110, 210, 0.22);
      --text:   #b8d4f2;
      --muted:  #3a5a82;
      --bright: #e8f4ff;
      --accent: #2a7aef;
      --ok:     #30d870;
      --warn:   #f0a020;
      --err:    #f03838;
      --font:   'Inter', system-ui, sans-serif;
      --mono:   'JetBrains Mono', 'Courier New', monospace;
      --blur:   blur(18px) saturate(1.6);
      --r:      7px;
    }

    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }
    button { font-family: var(--font); cursor: pointer; }

    /* ── Icon helper ─────────────────────────────────────── */
    .ic {
      display: inline-block; width: 13px; height: 13px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      vertical-align: middle; flex-shrink: 0; overflow: visible;
    }
    svg.defs { display: none; }

    /* ── Left panel ──────────────────────────────────────── */
    #panel {
      position: fixed; top: 0; left: 0;
      width: 230px; height: 100vh;
      background: var(--panel);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 10;
      transition: opacity 0.5s ease;
    }
    #panel-head {
      padding: 18px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo   { font: 600 1.3rem var(--font); color: var(--bright); letter-spacing: .05em; }
    .logo-s { font-size: .6rem; color: var(--muted); letter-spacing: .12em;
              text-transform: uppercase; margin-top: 3px; }

    /* Mode bar */
    #mode-bar {
      display: flex; gap: 5px; padding: 9px 12px;
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .mbtn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px;
      padding: 6px 4px;
      background: transparent; border: 1px solid var(--border); border-radius: var(--r);
      color: var(--muted); font: 500 .68rem var(--font); letter-spacing: .07em;
      transition: all .15s;
    }
    .mbtn:hover { color: var(--text); border-color: rgba(60,140,240,.4); }
    .mbtn.on { background: rgba(42,122,239,.18); border-color: var(--accent); color: #7ab8ff; }

    /* Live section */
    #live-sec { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    #live-bar {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 12px; font-size: .7rem; color: var(--muted);
      border-bottom: 1px solid var(--border); flex-shrink: 0;
    }
    .ldot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0; transition: background .3s;
    }
    .ldot.ok  { background: var(--ok);  box-shadow: 0 0 5px var(--ok); }
    .ldot.err { background: var(--err); }
    .ldot.dl  { background: var(--warn); }
    .ldot.pulse { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
    #live-txt { flex: 1; }
    #ibtn-play, #ibtn-stop {
      background: transparent; border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); padding: 2px 5px; line-height: 0; transition: all .15s;
    }
    #ibtn-play:hover { color: var(--ok);  border-color: var(--ok); }
    #ibtn-stop:hover { color: var(--err); border-color: var(--err); }
    #evt-list { flex: 1; overflow-y: auto; padding: 6px 8px; }
    #evt-list::-webkit-scrollbar { width: 3px; }
    #evt-list::-webkit-scrollbar-thumb { background: rgba(60,130,230,.25); border-radius: 2px; }
    .erow {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 8px; border-radius: 5px; cursor: pointer;
      border: 1px solid transparent; transition: all .12s; margin-bottom: 3px;
    }
    .erow:hover { background: rgba(42,122,239,.1); border-color: rgba(42,122,239,.25); }
    .erow.cur  { background: rgba(42,122,239,.18); border-color: var(--accent); }
    .einfo { flex: 1; min-width: 0; }
    .ename { font: 500 .66rem var(--mono); color: var(--text);
             white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .etime { font-size: .59rem; color: var(--muted); margin-top: 2px; }
    .edl {
      background: transparent; border: 1px solid var(--border); border-radius: 4px;
      color: var(--muted); padding: 2px 5px; line-height: 0; flex-shrink: 0;
      transition: all .15s;
    }
    .edl:hover { color: var(--accent); border-color: var(--accent); }
    #local-sec { padding: 12px; flex-shrink: 0; }
    .uplbl {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      width: 100%; padding: 9px 12px;
      background: rgba(42,122,239,.13); border: 1px solid rgba(42,122,239,.4);
      border-radius: var(--r); color: #80b8ff;
      font: 500 .73rem var(--font); letter-spacing: .08em;
      cursor: pointer; user-select: none; transition: background .15s;
    }
    .uplbl:hover { background: rgba(42,122,239,.24); }
    #file-in { display: none; }
    #statusbar {
      padding: 8px 12px; font-size: .66rem; color: var(--muted);
      line-height: 1.7; min-height: 34px;
      border-top: 1px solid var(--border); flex-shrink: 0;
    }
    .ok   { color: var(--ok); }
    .warn { color: var(--warn); }
    .err  { color: var(--err); }

    /* ── Right slider ────────────────────────────────────── */
    #slider-wrap {
      position: fixed; right: 18px; top: 50%; transform: translateY(-50%);
      z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      padding: 14px 12px;
      background: rgba(1, 14, 34, 0.78);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border); border-radius: 14px;
      box-shadow: 0 4px 28px rgba(0,0,0,.45);
      /* fade in/out on hover */
      opacity: 0.2;
      transition: opacity 0.38s ease;
    }
    #slider-wrap:hover, #slider-wrap.dragging { opacity: 1; }

    .slbl { font: 400 .56rem var(--font); letter-spacing: .14em; color: var(--muted);
            text-transform: uppercase; text-align: center; }
    .sval { font: 400 .6rem var(--mono); color: var(--muted); text-align: center; min-width: 62px; }

    #strak {
      position: relative; width: 26px; height: 340px;
      border-radius: 13px; cursor: pointer; user-select: none; touch-action: none;
      background: linear-gradient(to top,
        #0030ff  0%, #00b8ff 20%, #00e870 42%,
        #ffe000  65%, #ff4800 84%, #ff0000 100%
      );
      border: 1px solid rgba(255,255,255,.1);
      box-shadow: 0 0 22px rgba(0,60,200,.24), inset 0 1px 6px rgba(0,0,0,.35);
    }
    #sthumb {
      position: absolute; left: -6px; right: -6px; height: 3px;
      border-radius: 2px; background: #ffffff;
      box-shadow: 0 0 8px rgba(255,255,255,.9);
      pointer-events: none; top: 50%;
    }
    #sthlbl {
      position: absolute; right: calc(100% + 8px); top: 50%; transform: translateY(-50%);
      white-space: nowrap; font: 500 .62rem var(--mono); color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,.8); pointer-events: none;
    }
    #scur {
      font: 600 .7rem var(--mono); color: var(--bright);
      background: rgba(1,14,34,.9); border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 6px; text-align: center; min-width: 68px;
    }

    /* ── Tools panel (bottom-right) ──────────────────────── */
    #tools {
      position: fixed; right: 16px; bottom: 22px;
      z-index: 10;
      display: flex; flex-direction: column; gap: 7px;
      opacity: 0.2;
      transition: opacity 0.38s ease;
    }
    #tools:hover { opacity: 1; }
    .tbtn {
      width: 34px; height: 34px;
      background: rgba(1, 14, 34, 0.82);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border); border-radius: 9px;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all .18s;
    }
    .tbtn:hover { color: var(--bright); border-color: rgba(80,160,255,.5); }
    .tbtn.on { color: var(--accent); border-color: var(--accent); background: rgba(42,122,239,.18); }

    /* ── Hover tooltip ───────────────────────────────────── */
    #tip {
      position: fixed; pointer-events: none; z-index: 20;
      padding: 11px 15px;
      background: rgba(1,14,34,.92);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border); border-radius: var(--r);
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      white-space: nowrap;
    }
    #tip-cell { font: 600 1.05rem var(--font); color: var(--bright); margin-bottom: 6px; letter-spacing: .02em; }
    .tdiv { border: none; border-top: 1px solid var(--border); margin: 5px 0; }
    .trow { display: flex; justify-content: space-between; gap: 20px; margin-top: 3px; }
    .tkey { font: 400 .6rem var(--font); color: var(--muted);
            text-transform: uppercase; letter-spacing: .09em; align-self: center; }
    .tval { font: 500 .72rem var(--mono); color: var(--bright); }

    /* ── Cinema mode ─────────────────────────────────────── */
    body.cinema #panel,
    body.cinema #tools        { opacity: 0 !important; pointer-events: none; }
    body.cinema #slider-wrap  { opacity: 0 !important; pointer-events: none; }
    body.cinema #tip          { display: none; }

    /* Cinema exit pill (top-right, only in cinema) */
    #cinema-exit {
      position: fixed; top: 20px; right: 20px; z-index: 50;
      display: none; align-items: center; gap: 7px;
      padding: 8px 16px;
      background: rgba(1, 14, 34, 0.70);
      backdrop-filter: var(--blur);
      border: 1px solid rgba(255,255,255,.15); border-radius: 22px;
      color: rgba(210,230,255,.6);
      font: 400 .65rem var(--font); letter-spacing: .10em; text-transform: uppercase;
      cursor: pointer;
      transition: all .22s;
    }
    body.cinema #cinema-exit { display: flex; }
    #cinema-exit:hover { color: #fff; border-color: rgba(255,255,255,.35); background: rgba(1,14,34,.90); }
  </style>
</head>

<script type="module">
import * as THREE         from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import wasmInit, { parse_atlas_id } from './atlas-id-parser/pkg/atlas_id_parser.js';

// ── Live poller (graceful if unavailable) ─────────────────────────────────────
let LivePoller = null;
try {
  ({ LivePoller } = await import('./live_atlas/live_cern/live_poller.js'));
} catch (_) { /* offline-only mode */ }

// ── Constants ─────────────────────────────────────────────────────────────────
const PAL_N     = 4096;   // palette resolution
const DEF_THR   = 200;    // default threshold, MeV
const LOG_FLOOR = 1;      // log-scale floor, MeV

// ── State ─────────────────────────────────────────────────────────────────────
const meshByName = new Map();   // CGV path → THREE.Mesh
const origMat    = new Map();   // CGV path → original material
let   active     = new Map();   // CGV path → { energyGev, energyMev, cellName }
let   rayTargets = [];          // visible meshes for raycasting

let eMaxMev    = 1;
let thrMev     = DEF_THR;
let wasmOk     = false;
let sceneOk    = false;
let dirty      = true;
let curEvtId   = null;
let isLive     = true;
let showInfo   = true;    // tooltip + outline toggle
let cinemaMode = false;
let ghostGroup = null;
let ghostOn    = false;

// ── Palette: 4096-step jet colormap ──────────────────────────────────────────
const PAL = Array.from({ length: PAL_N }, (_, i) => {
  const t = i / (PAL_N - 1);
  const r = Math.min(1, Math.max(0, 2 * t - 1));
  const g = Math.min(1, Math.max(0, 1 - Math.abs(2 * t - 1)));
  const b = Math.min(1, Math.max(0, 1 - 2 * t));
  return new THREE.MeshLambertMaterial({
    color: new THREE.Color(r, g, b),
    transparent: true, opacity: 0.86, side: THREE.DoubleSide,
  });
});

// Log-scale color mapping — mirrors the slider scale exactly.
// t=0 → blue (low energy), t=1 → red (peak energy).
function palMat(eMev) {
  if (!isFinite(eMev) || eMaxMev <= LOG_FLOOR) return PAL[0];
  const t = eMev <= LOG_FLOOR
    ? 0
    : Math.max(0, Math.min(1,
        Math.log(eMev / LOG_FLOOR) / Math.log(eMaxMev / LOG_FLOOR)));
  return PAL[Math.round(t * (PAL_N - 1))];
}

// ── Renderer ──────────────────────────────────────────────────────────────────
const canvas   = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias:       true,
  powerPreference: 'high-performance',
  precision:       'highp',
});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;

// ── Scene / Camera / Controls ─────────────────────────────────────────────────
const scene  = new THREE.Scene();
scene.background = new THREE.Color(0x01192e);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 10, 100_000);
camera.position.set(0, 0, 12_000);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.055;
controls.zoomSpeed     = 1.2;
controls.addEventListener('change', () => {
  dirty = true;
  if (!cinemaMode) { tooltip.hidden = true; clearOutline(); }
});

// ── Lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const key = new THREE.DirectionalLight(0xffffff, 0.95);
key.position.set(600, 1500, 1000);
scene.add(key);
const fill = new THREE.DirectionalLight(0x5577ff, 0.28);
fill.position.set(-800, -400, 600);
scene.add(fill);

// ── Render loop (dirty flag; always renders during cinema autoRotate) ─────────
(function loop() {
  requestAnimationFrame(loop);
  controls.update();
  if (controls.autoRotate) dirty = true;
  if (!dirty) return;
  renderer.render(scene, camera);
  dirty = false;
})();

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  dirty = true;
});

// ── Status bar ────────────────────────────────────────────────────────────────
const statusEl  = document.getElementById('statusbar');
const setStatus = h => { statusEl.innerHTML = h; };

function checkReady() {
  if (!wasmOk || !sceneOk) return;
  setStatus('Ready — waiting for event…');
  if (isLive && poller) {
    poller.start();
    const list = poller.getList();
    if (list.length > 0) { curEvtId = list[0].id; processXml(list[0].text); renderEvtList(); }
  }
}

// ── GLB ───────────────────────────────────────────────────────────────────────
new GLTFLoader().load(
  'CaloGeometry.glb',
  ({ scene: g }) => {
    g.traverse(o => {
      if (!o.isMesh) return;
      o.visible = false;
      meshByName.set(o.name, o);
      origMat.set(o.name, o.material);
    });
    scene.add(g);
    sceneOk = true; dirty = true;
    checkReady();
  },
  x => { if (x.total) setStatus(`Loading geometry: ${Math.round(x.loaded / x.total * 100)} %`); },
  () => {
    setStatus('<span class="warn">CaloGeometry.glb not found — run root2scene.mjs first.</span>');
    sceneOk = true; checkReady();
  }
);

// ── WASM ──────────────────────────────────────────────────────────────────────
wasmInit()
  .then(() => { wasmOk = true; checkReady(); })
  .catch(e  => setStatus(`<span class="err">WASM error: ${esc(e.message)}</span>`));

// ── TileCal ID → cell-name mapping ────────────────────────────────────────────
function compX(sec, samp, tow) {
  if (sec < 3) {
    if (samp === 0) return sec === 1 ?  1 :  5;
    if (samp === 1) return sec === 1 ? 23 :  6;
    if (samp === 2) return sec === 1 ?  4 :  7;
  } else {
    if (tow ===  8) return  8; if (tow ===  9) return  9;
    if (tow === 10) return 10; if (tow === 11) return 11;
    if (tow === 13) return 12; if (tow === 15) return 13;
  }
  return null;
}

function compK(tow, samp, x) {
  if (tow < 8) return samp === 2 ? Math.floor(tow / 2) : tow;
  if (tow ===  8) { return (x===0||x===1) ? 8 : 0; }
  if (tow ===  9) { if (x===1) return 9; if (x===9) return 0; return null; }
  if (tow === 10) return 0;
  if (tow === 11) { if (x===11||x===5) return 0; if (x===6) return 1; return null; }
  if (tow === 12) { if (x===5) return 1; if (x===6) return 2; if (x===7) return 1; return null; }
  if (tow === 13) { if (x===12) return 0; if (x===5) return 2; if (x===6) return 3; return null; }
  if (tow === 14) { if (x===5) return 3; if (x===6) return 4; return null; }
  if (tow === 15) { if (x===13) return 0; if (x===5) return 4; return null; }
  return null;
}

function cellLabel(x, k) {
  switch (x) {
    case  1: return `A${k+1}`;    case 23: return `BC${k+1}`;
    case  4: return `D${k}`;      case  5: return `A${k+12}`;
    case  6: return `B${k+11}`;   case  7: return `D${k+5}`;
    case  8: return 'D4';         case  9: return 'C10';
    case 10: return 'E1';         case 11: return 'E2';
    case 12: return 'E3';         case 13: return 'E4';
    default: return '?';
  }
}

// ── XML parser ────────────────────────────────────────────────────────────────
function parseTile(xmlText) {
  const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
  const pe  = doc.querySelector('parsererror');
  if (pe) throw new Error('XML parse error: ' + pe.textContent.slice(0, 120));
  const tiles = [...doc.getElementsByTagName('TILE')];
  if (!tiles.length) throw new Error('No <TILE> element found');
  const cells = [];
  for (const tile of tiles) {
    let n = 0;
    for (const ch of tile.children) {
      const id = ch.getAttribute('id') ?? ch.getAttribute('cellID');
      const ev = ch.getAttribute('energy') ?? ch.getAttribute('e');
      if (id && ev) { const e = parseFloat(ev); if (isFinite(e)) { cells.push({ id: id.trim(), energy: e }); n++; } }
    }
    if (n) continue;
    const idEl = tile.querySelector('id, cellID');
    const eEl  = tile.querySelector('energy, e');
    if (idEl && eEl) {
      const ids = idEl.textContent.trim().split(/\s+/);
      const ens = eEl.textContent.trim().split(/\s+/).map(Number);
      const m   = Math.min(ids.length, ens.length);
      for (let i = 0; i < m; i++) if (ids[i] && isFinite(ens[i])) cells.push({ id: ids[i], energy: ens[i] });
    }
  }
  return cells;
}

// ── Scene reset ───────────────────────────────────────────────────────────────
function resetScene() {
  for (const [name, mesh] of meshByName) {
    mesh.visible  = false;
    mesh.material = origMat.get(name) ?? mesh.material;
  }
  active.clear(); rayTargets = [];
  clearOutline();
  document.getElementById('slider-wrap').hidden = true;
  tooltip.hidden = true;
  dirty = true;
}

// ── Threshold (visibility filter) ────────────────────────────────────────────
function applyThreshold(mev) {
  rayTargets = [];
  for (const [name, { energyMev }] of active) {
    const mesh = meshByName.get(name);
    if (!mesh) continue;
    const vis = !isFinite(mev) || energyMev >= mev;
    mesh.visible = vis;
    if (vis) rayTargets.push(mesh);
  }
  dirty = true;
}

// ── Process XML ───────────────────────────────────────────────────────────────
function processXml(xmlText) {
  if (!wasmOk) return;
  let cells;
  try { cells = parseTile(xmlText); }
  catch (e) { setStatus(`<span class="err">${esc(e.message)}</span>`); return; }
  if (!cells.length) { setStatus('<span class="warn">No TILE cells found</span>'); return; }

  setStatus(`Decoding ${cells.length} cells…`);
  resetScene();

  // energies in MeV (raw XML values are in GeV → ×1000)
  const mevs = cells.map(c => c.energy * 1000).filter(isFinite);
  const eMin = Math.min(...mevs);
  eMaxMev    = Math.max(...mevs);

  let nHit = 0, nMiss = 0, nSkip = 0;
  for (const { id, energy } of cells) {
    const eMev = energy * 1000;
    let p;
    try { p = parse_atlas_id(id); } catch { nSkip++; continue; }
    if (!p?.valid || p.subsystem !== 'TILECAL') { nSkip++; continue; }
    const f = Object.fromEntries(p.fields.map(({ name, value }) => [name, value]));
    const x = compX(f.section, f.sampling, f.tower); if (x === null) { nMiss++; continue; }
    const k = compK(f.tower, f.sampling, x);         if (k === null) { nMiss++; continue; }
    const y    = f.side < 0 ? 'p' : 'n';
    const path = `Calorimeter\u2192Tile${x}${y}_0\u2192Tile${x}${y}${k}_${k}\u2192cell_${f.module}`;
    const mesh = meshByName.get(path);
    if (!mesh) { nMiss++; continue; }
    mesh.material = palMat(eMev);   // log-scale color
    mesh.visible  = true;
    active.set(path, { energyGev: energy, energyMev: eMev, cellName: cellLabel(x, k) });
    nHit++;
  }

  initSlider(eMin, eMaxMev);
  applyThreshold(thrMev);
  setStatus(
    `<span class="ok">${nHit} cells</span>` +
    (nMiss ? ` · <span class="warn">${nMiss} unmapped</span>` : '') +
    ` · E: ${fmtMev(eMin)} – ${fmtMev(eMaxMev)}`
  );
}

// ── Slider ────────────────────────────────────────────────────────────────────
const sliderWrap = document.getElementById('slider-wrap');
const strak      = document.getElementById('strak');
const sthumb     = document.getElementById('sthumb');
const sthlbl     = document.getElementById('sthlbl');
const scur       = document.getElementById('scur');
let   sdrag      = false;

function mevToRatio(mev) {
  if (!isFinite(mev) || mev <= LOG_FLOOR || eMaxMev <= LOG_FLOOR) return 0;
  return Math.max(0, Math.min(1, Math.log(mev / LOG_FLOOR) / Math.log(eMaxMev / LOG_FLOOR)));
}
function ratioToMev(r) {
  if (r <= 0) return -Infinity;
  return LOG_FLOOR * Math.pow(eMaxMev / LOG_FLOOR, Math.min(1, r));
}
function placeThumb(r) { sthumb.style.top = ((1 - r) * 100) + '%'; }
function updateSliderUI(mev) {
  const lbl = !isFinite(mev) ? 'ALL' : fmtMev(mev);
  sthlbl.textContent = lbl;
  scur.textContent   = lbl;
  placeThumb(mevToRatio(mev));
}
function initSlider(eMin, eMax) {
  document.getElementById('smax').textContent = fmtMev(eMax);
  document.getElementById('smin').textContent = fmtMev(eMin);
  if (isFinite(thrMev) && thrMev > eMax) thrMev = Math.min(DEF_THR, eMax);
  updateSliderUI(thrMev);
  sliderWrap.hidden = false;
}
function sliderRatioFromPtr(e) {
  const rect = strak.getBoundingClientRect();
  const y    = (e.clientY ?? e.touches?.[0]?.clientY ?? 0) - rect.top;
  return 1 - Math.max(0, Math.min(1, y / rect.height));
}

strak.addEventListener('pointerdown', e => {
  sdrag = true;
  sliderWrap.classList.add('dragging');
  strak.setPointerCapture(e.pointerId);
  thrMev = ratioToMev(sliderRatioFromPtr(e));
  updateSliderUI(thrMev); applyThreshold(thrMev);
});
strak.addEventListener('pointermove', e => {
  if (!sdrag) return;
  thrMev = ratioToMev(sliderRatioFromPtr(e));
  updateSliderUI(thrMev); applyThreshold(thrMev);
});
['pointerup', 'pointercancel'].forEach(t => strak.addEventListener(t, () => {
  sdrag = false;
  sliderWrap.classList.remove('dragging');
}));

// ── Ghost ATLAS geometry ──────────────────────────────────────────────────────
// Approximate cylindrical shells showing the main ATLAS sub-detector layers.
// Coordinate system matches the GLB: x-y = transverse plane, z = beam axis (mm).
// Dimensions sourced from ATLAS detector paper (JINST 3 S08003, 2008).
const GHOST_MAT = new THREE.LineBasicMaterial({
  color: 0x4077cc, transparent: true, opacity: 0.16, depthWrite: false,
});

function ghostRing(r, z, segs = 64) {
  const pts = [];
  for (let i = 0; i <= segs; i++) {
    const a = (i / segs) * Math.PI * 2;
    pts.push(new THREE.Vector3(r * Math.cos(a), r * Math.sin(a), z));
  }
  return new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), GHOST_MAT);
}

function ghostBarrel(r, z0, z1, nVert = 8) {
  const grp = new THREE.Group();
  grp.add(ghostRing(r, z0), ghostRing(r, z1));
  for (let i = 0; i < nVert; i++) {
    const a = (i / nVert) * Math.PI * 2;
    const x = r * Math.cos(a), y = r * Math.sin(a);
    grp.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints([
        new THREE.Vector3(x, y, z0),
        new THREE.Vector3(x, y, z1),
      ]), GHOST_MAT
    ));
  }
  return grp;
}

function buildGhostAtlas() {
  if (ghostGroup) return;
  ghostGroup = new THREE.Group();

  // Inner Detector outer boundary (SCT + TRT region)
  ghostGroup.add(ghostBarrel(1100, -3400, 3400, 10));

  // LAr EM Calorimeter barrel outer boundary
  ghostGroup.add(ghostBarrel(1960, -3200, 3200, 12));

  // Muon Spectrometer outer boundary
  ghostGroup.add(ghostBarrel(10500, -10500, 10500, 16));

  // Beam axis reference line
  ghostGroup.add(new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([
      new THREE.Vector3(0, 0, -11500),
      new THREE.Vector3(0, 0,  11500),
    ]), GHOST_MAT
  ));

  ghostGroup.visible = false;
  scene.add(ghostGroup);
}

function toggleGhost() {
  buildGhostAtlas();
  ghostOn = !ghostOn;
  ghostGroup.visible = ghostOn;
  document.getElementById('btn-ghost').classList.toggle('on', ghostOn);
  dirty = true;
}

// ── EdgesGeometry outline on hover ───────────────────────────────────────────
const eGeoCache  = new Map();  // geometry.uuid → EdgesGeometry
const outlineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
let   outlineMesh = null;

function clearOutline() {
  if (!outlineMesh) return;
  scene.remove(outlineMesh);
  outlineMesh = null;
  dirty = true;
}

function showOutline(mesh) {
  if (outlineMesh?.userData.src === mesh.name) return;
  clearOutline();
  mesh.updateWorldMatrix(true, false);
  const uid = mesh.geometry.uuid;
  if (!eGeoCache.has(uid)) eGeoCache.set(uid, new THREE.EdgesGeometry(mesh.geometry, 15));
  outlineMesh = new THREE.LineSegments(eGeoCache.get(uid), outlineMat);
  outlineMesh.matrix.copy(mesh.matrixWorld);
  outlineMesh.matrixAutoUpdate = false;
  outlineMesh.renderOrder = 999;
  outlineMesh.userData.src = mesh.name;
  scene.add(outlineMesh);
  dirty = true;
}

// ── Hover tooltip + outline ───────────────────────────────────────────────────
const raycast = new THREE.Raycaster();
const mxy     = new THREE.Vector2();
const tooltip = document.getElementById('tip');
let   lastRay = 0;

canvas.addEventListener('mousemove', e => {
  if (!showInfo || cinemaMode) { tooltip.hidden = true; return; }
  const now = Date.now();
  if (now - lastRay < 34) return;
  lastRay = now;
  if (!active.size) { tooltip.hidden = true; clearOutline(); return; }

  mxy.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycast.setFromCamera(mxy, camera);
  const hits = raycast.intersectObjects(rayTargets, false);

  if (hits.length) {
    const data = active.get(hits[0].object.name);
    if (data) {
      showOutline(hits[0].object);
      document.getElementById('tip-cell').textContent = data.cellName;
      document.getElementById('tip-e').textContent    = `${data.energyGev.toFixed(4)} GeV`;
      tooltip.style.left = Math.min(e.clientX + 18, innerWidth  - 200) + 'px';
      tooltip.style.top  = Math.min(e.clientY + 18, innerHeight -  90) + 'px';
      tooltip.hidden = false;
    }
  } else {
    clearOutline();
    tooltip.hidden = true;
  }
});
canvas.addEventListener('mouseleave', () => { clearOutline(); tooltip.hidden = true; });

// ── Cinema mode ───────────────────────────────────────────────────────────────
function enterCinema() {
  cinemaMode = true;
  document.body.classList.add('cinema');
  controls.autoRotate      = true;
  controls.autoRotateSpeed = 0.38;
  document.getElementById('btn-cinema').classList.add('on');
  clearOutline();
  tooltip.hidden = true;
}

function exitCinema() {
  cinemaMode = false;
  document.body.classList.remove('cinema');
  controls.autoRotate = false;
  document.getElementById('btn-cinema').classList.remove('on');
}

document.getElementById('btn-cinema').addEventListener('click', () => {
  if (!cinemaMode) enterCinema(); else exitCinema();
});
document.getElementById('cinema-exit').addEventListener('click', exitCinema);

// A plain click on the canvas (not a drag) also exits cinema
let cDragged = false;
canvas.addEventListener('mousedown', () => { cDragged = false; });
canvas.addEventListener('mousemove', () => { cDragged = true; });
canvas.addEventListener('mouseup',   () => { if (cinemaMode && !cDragged) exitCinema(); });

// ── Tooltip + outline toggle ──────────────────────────────────────────────────
document.getElementById('btn-info').addEventListener('click', () => {
  showInfo = !showInfo;
  document.getElementById('btn-info').classList.toggle('on', showInfo);
  document.querySelector('#btn-info use').setAttribute('href', showInfo ? '#i-eye' : '#i-eye-off');
  if (!showInfo) { clearOutline(); tooltip.hidden = true; }
});

// ── Ghost toggle ──────────────────────────────────────────────────────────────
document.getElementById('btn-ghost').addEventListener('click', toggleGhost);

// ── Mode toggle ───────────────────────────────────────────────────────────────
document.getElementById('btn-live').addEventListener('click', () => {
  if (isLive) return;
  isLive = true;
  document.getElementById('btn-live').classList.add('on');
  document.getElementById('btn-local').classList.remove('on');
  document.getElementById('live-sec').hidden  = false;
  document.getElementById('local-sec').hidden = true;
  if (poller && wasmOk && sceneOk) poller.start();
});
document.getElementById('btn-local').addEventListener('click', () => {
  if (!isLive) return;
  isLive = false;
  document.getElementById('btn-local').classList.add('on');
  document.getElementById('btn-live').classList.remove('on');
  document.getElementById('local-sec').hidden = false;
  document.getElementById('live-sec').hidden  = true;
  if (poller) { poller.stop(); setLiveDot('stopped'); }
});

// ── LivePoller ────────────────────────────────────────────────────────────────
let poller = null;
if (LivePoller) poller = new LivePoller();

function setLiveDot(state) {
  const dot = document.getElementById('ldot');
  const txt = document.getElementById('live-txt');
  dot.className = 'ldot';
  switch (state) {
    case 'polling':     dot.classList.add('ok', 'pulse'); txt.textContent = 'Polling…'; break;
    case 'same':        dot.classList.add('ok');          txt.textContent = 'Up to date'; break;
    case 'downloading': dot.classList.add('dl', 'pulse'); txt.textContent = 'Fetching…'; break;
    case 'error':       dot.classList.add('err');         txt.textContent = 'Error'; break;
    default:            txt.textContent = 'Stopped';
  }
}

const SVG_DL = `<svg class="ic"><use href="#i-dl"/></svg>`;

function relTime(ts) {
  const s = (Date.now() - ts) / 1000;
  if (s < 10)   return 'just now';
  if (s < 60)   return `${Math.floor(s)} s ago`;
  if (s < 3600) return `${Math.floor(s / 60)} min ago`;
  return `${Math.floor(s / 3600)} h ago`;
}

function renderEvtList() {
  const list = poller ? poller.getList() : [];
  const el   = document.getElementById('evt-list');
  el.innerHTML = '';
  list.forEach((entry, idx) => {
    const row = document.createElement('div');
    row.className = 'erow' + (entry.id === curEvtId ? ' cur' : '');
    row.innerHTML = `
      <div class="einfo">
        <div class="ename">${esc(entry.name)}</div>
        <div class="etime" data-ts="${entry.timestamp}">${relTime(entry.timestamp)}</div>
      </div>
      <button class="edl" title="Download XML">${SVG_DL}</button>`;
    row.querySelector('.einfo').addEventListener('click', () => {
      curEvtId = entry.id; processXml(entry.text); renderEvtList();
    });
    row.querySelector('.edl').addEventListener('click', ev => {
      ev.stopPropagation(); poller.download(idx);
    });
    el.appendChild(row);
  });
}

setInterval(() => {
  for (const el of document.querySelectorAll('.etime[data-ts]'))
    el.textContent = relTime(+el.dataset.ts);
}, 30_000);

if (poller) {
  poller.addEventListener('newxml',     ({ detail: { entry } }) => { curEvtId = entry.id; processXml(entry.text); renderEvtList(); });
  poller.addEventListener('listupdate', renderEvtList);
  poller.addEventListener('status',     ({ detail: { state } }) => setLiveDot(state));
  poller.addEventListener('error',      ({ detail }) => console.warn('[LivePoller]', detail.message));
  poller.init().then(() => renderEvtList()).catch(() => {});
} else {
  document.getElementById('btn-local').click();
}

document.getElementById('ibtn-play').addEventListener('click', () => {
  if (!poller) return;
  poller.start();
  document.getElementById('ibtn-play').hidden = true;
  document.getElementById('ibtn-stop').hidden = false;
});
document.getElementById('ibtn-stop').addEventListener('click', () => {
  if (!poller) return;
  poller.stop();
  document.getElementById('ibtn-stop').hidden = true;
  document.getElementById('ibtn-play').hidden = false;
  setLiveDot('stopped');
});

// ── File input (local mode) ───────────────────────────────────────────────────
document.getElementById('file-in').addEventListener('change', async e => {
  const f = e.target.files?.[0];
  if (f) { setStatus('Parsing…'); processXml(await f.text()); }
  e.target.value = '';
});

// ── Utilities ─────────────────────────────────────────────────────────────────
function fmtMev(v) {
  if (!isFinite(v)) return 'ALL';
  const a = Math.abs(v);
  if (a >= 1000) return `${(v / 1000).toPrecision(3)} GeV`;
  if (a >= 1)    return `${v.toFixed(1)} MeV`;
  return `${v.toFixed(3)} MeV`;
}
function esc(s) {
  return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
