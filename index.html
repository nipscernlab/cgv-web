<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CGV — ATLAS Calorimeter Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script type="importmap">
  {
    "imports": {
      "three":         "https://cdn.jsdelivr.net/npm/three@0.167.1/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.1/examples/jsm/"
    }
  }
  </script>
  <style>
    /* ── Variables ─────────────────────────────────────── */
    :root {
      --bg:        #01192e;
      --panel:     rgba(1, 20, 45, 0.78);
      --border:    rgba(40, 110, 210, 0.22);
      --text:      #b8d4f2;
      --muted:     #3a5a82;
      --bright:    #e8f4ff;
      --accent:    #2a7aef;
      --ok:        #30d870;
      --warn:      #f0a020;
      --err:       #f03838;
      --font:      'Inter', system-ui, sans-serif;
      --mono:      'JetBrains Mono', 'Courier New', monospace;
      --blur:      blur(18px) saturate(1.6);
      --r:         7px;
    }

    /* ── Reset ─────────────────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    button { font-family: var(--font); cursor: pointer; }

    /* ── Icon helper ───────────────────────────────────── */
    .ic {
      display: inline-block;
      width: 13px; height: 13px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      vertical-align: middle; flex-shrink: 0;
      overflow: visible;
    }
    svg.defs { display: none; }

    /* ── Left panel ────────────────────────────────────── */
    #panel {
      position: fixed;
      top: 0; left: 0;
      width: 230px; height: 100vh;
      background: var(--panel);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      z-index: 10;
    }

    #panel-head {
      padding: 18px 16px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo    { font: 600 1.3rem var(--font); color: var(--bright); letter-spacing: .05em; }
    .logo-s  { font-size: .6rem; color: var(--muted); letter-spacing: .12em;
               text-transform: uppercase; margin-top: 3px; }

    /* Mode bar */
    #mode-bar {
      display: flex; gap: 5px;
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .mbtn {
      flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px;
      padding: 6px 4px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--muted);
      font: 500 .68rem var(--font); letter-spacing: .07em;
      transition: all .15s;
    }
    .mbtn:hover { color: var(--text); border-color: rgba(60,140,240,.4); }
    .mbtn.on  {
      background: rgba(42,122,239,.18);
      border-color: var(--accent);
      color: #7ab8ff;
    }

    /* Live section */
    #live-sec { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
    #live-bar {
      display: flex; align-items: center; gap: 7px;
      padding: 8px 12px;
      font-size: .7rem; color: var(--muted);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .ldot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
      transition: background .3s;
    }
    .ldot.ok  { background: var(--ok);  box-shadow: 0 0 5px var(--ok);  }
    .ldot.err { background: var(--err); }
    .ldot.dl  { background: var(--warn); }
    .ldot.pulse { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }
    #live-txt { flex: 1; }

    #ibtn-play, #ibtn-stop {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--muted);
      padding: 2px 5px; line-height: 0;
      transition: all .15s;
    }
    #ibtn-play:hover { color: var(--ok);  border-color: var(--ok); }
    #ibtn-stop:hover { color: var(--err); border-color: var(--err); }

    /* Event list */
    #evt-list {
      flex: 1; overflow-y: auto; padding: 6px 8px;
    }
    #evt-list::-webkit-scrollbar { width: 3px; }
    #evt-list::-webkit-scrollbar-thumb { background: rgba(60,130,230,.25); border-radius: 2px; }
    .erow {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 8px; border-radius: 5px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all .12s;
      margin-bottom: 3px;
    }
    .erow:hover { background: rgba(42,122,239,.1); border-color: rgba(42,122,239,.25); }
    .erow.cur  { background: rgba(42,122,239,.18); border-color: var(--accent); }
    .einfo { flex: 1; min-width: 0; }
    .ename { font: 500 .66rem var(--mono); color: var(--text);
             white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .etime { font-size: .59rem; color: var(--muted); margin-top: 2px; }
    .edl {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px; color: var(--muted);
      padding: 2px 5px; line-height: 0;
      flex-shrink: 0;
      transition: all .15s;
    }
    .edl:hover { color: var(--accent); border-color: var(--accent); }

    /* Local section */
    #local-sec { padding: 12px; flex-shrink: 0; }
    .uplbl {
      display: flex; align-items: center; justify-content: center; gap: 7px;
      width: 100%; padding: 9px 12px;
      background: rgba(42,122,239,.13);
      border: 1px solid rgba(42,122,239,.4);
      border-radius: var(--r);
      color: #80b8ff;
      font: 500 .73rem var(--font); letter-spacing: .08em;
      cursor: pointer; user-select: none;
      transition: background .15s;
    }
    .uplbl:hover { background: rgba(42,122,239,.24); }
    #file-in { display: none; }

    /* Status */
    #statusbar {
      padding: 8px 12px;
      font-size: .66rem; color: var(--muted);
      line-height: 1.7; min-height: 34px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    .ok   { color: var(--ok);   }
    .warn { color: var(--warn); }
    .err  { color: var(--err);  }

    /* ── Right slider ──────────────────────────────────── */
    #slider-wrap {
      position: fixed;
      right: 18px; top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      display: flex; flex-direction: column; align-items: center; gap: 5px;
      padding: 12px 10px;
      background: rgba(1, 14, 34, 0.78);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: 14px;
      box-shadow: 0 4px 28px rgba(0,0,0,.45);
    }
    .slbl { font: 400 .56rem var(--font); letter-spacing: .14em; color: var(--muted);
            text-transform: uppercase; text-align: center; }
    .sval { font: 400 .6rem var(--mono); color: var(--muted); text-align: center;
            min-width: 62px; }
    #strak {
      position: relative;
      width: 22px; height: 280px;
      border-radius: 11px;
      cursor: pointer;
      user-select: none; touch-action: none;
      background: linear-gradient(to top,
        #0030ff  0%,
        #00b8ff 20%,
        #00e870 42%,
        #ffe000 65%,
        #ff4800 84%,
        #ff0000 100%
      );
      border: 1px solid rgba(255,255,255,.1);
      box-shadow: 0 0 20px rgba(0,60,200,.22), inset 0 1px 6px rgba(0,0,0,.35);
    }
    /* Thumb: white horizontal line */
    #sthumb {
      position: absolute;
      left: -5px; right: -5px;
      height: 3px;
      border-radius: 2px;
      background: #ffffff;
      box-shadow: 0 0 8px rgba(255,255,255,.9);
      pointer-events: none;
      top: 50%; /* overridden by JS */
    }
    /* Threshold label next to thumb */
    #sthlbl {
      position: absolute;
      right: calc(100% + 7px);
      top: 50%; transform: translateY(-50%);
      white-space: nowrap;
      font: 500 .62rem var(--mono);
      color: #fff;
      text-shadow: 0 1px 4px rgba(0,0,0,.8);
      pointer-events: none;
    }
    #scur {
      font: 600 .7rem var(--mono); color: var(--bright);
      background: rgba(1,14,34,.9);
      border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 6px;
      text-align: center; min-width: 68px;
    }

    /* ── Hover tooltip ─────────────────────────────────── */
    #tip {
      position: fixed; pointer-events: none; z-index: 20;
      padding: 10px 14px;
      background: rgba(1,14,34,.92);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      white-space: nowrap;
    }
    #tip-cell { font: 700 1.0rem var(--font); color: var(--bright); margin-bottom: 5px; }
    .tdiv { border: none; border-top: 1px solid var(--border); margin: 4px 0; }
    .trow { display: flex; justify-content: space-between; gap: 18px; margin-top: 2px; }
    .tkey { font: 400 .6rem var(--font); color: var(--muted);
            text-transform: uppercase; letter-spacing: .09em; align-self: center; }
    .tval { font: 500 .72rem var(--mono); color: var(--bright); }
  </style>
</head>
<body>

<!-- ── SVG icon sprite ─────────────────────────────── -->
<svg class="defs" aria-hidden="true"><defs>
  <symbol id="i-wifi" viewBox="0 0 24 24">
    <path d="M5 12.55a11 11 0 0 1 14.08 0"/>
    <path d="M1.42 9a16 16 0 0 1 21.16 0"/>
    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
    <circle cx="12" cy="20" r="1" fill="currentColor" stroke="none"/>
  </symbol>
  <symbol id="i-folder" viewBox="0 0 24 24">
    <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
  </symbol>
  <symbol id="i-up" viewBox="0 0 24 24">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
    <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
  </symbol>
  <symbol id="i-dl" viewBox="0 0 24 24">
    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>

  </symbol>
  <symbol id="i-play" viewBox="0 0 24 24" fill="currentColor" stroke="none">

    <rect x="3" y="3" width="18" height="18" rx="2"/>
  </symbol>
</defs></svg>

<canvas id="c"></canvas>

<!-- ── Left panel ──────────────────────────────────── -->
<aside id="panel">
  <div id="panel-head">
    <div class="logo">CGV</div>
    <div class="logo-s">ATLAS · TileCal Viewer</div>
  </div>

  <div id="mode-bar">
    <button id="btn-live"  class="mbtn on">
      <svg class="ic"><use href="#i-wifi"/></svg> Live
    </button>
    <button id="btn-local" class="mbtn">
      <svg class="ic"><use href="#i-folder"/></svg> Local
    </button>
  </div>

  <!-- Live section -->
  <div id="live-sec">
    <div id="live-bar">
      <span class="ldot pulse" id="ldot"></span>
      <span id="live-txt">Starting…</span>
      <button id="ibtn-play" title="Start polling" hidden>
        <svg class="ic" style="width:10px;height:10px"><use href="#i-play"/></svg>
      </button>
      <button id="ibtn-stop" title="Stop polling">
        <svg class="ic" style="width:10px;height:10px"><use href="#i-stop"/></svg>
      </button>
    </div>
    <div id="evt-list"></div>
  </div>

  <!-- Local section (hidden by default) -->
  <div id="local-sec" hidden>
    <label class="uplbl" for="file-in">
      <svg class="ic"><use href="#i-up"/></svg>
      Upload XML
    </label>
    <input id="file-in" type="file" accept=".xml">
  </div>

  <div id="statusbar">Initializing…</div>
</aside>

<!-- ── Energy threshold slider ─────────────────────── -->
<div id="slider-wrap" hidden>
  <div class="slbl">Energy</div>
  <div class="slbl">Threshold</div>
  <div class="sval" id="smax">—</div>
  <div id="strak">
    <div id="sthumb">
      <div id="sthlbl"></div>
    </div>
  </div>
  <div class="sval" id="smin">—</div>
  <div id="scur">—</div>
</div>

<!-- ── Hover tooltip ───────────────────────────────── -->
<div id="tip" hidden>
  <div id="tip-cell">—</div>
  <hr class="tdiv">
  <div class="trow">
    <span class="tkey">Energy</span>
    <span class="tval" id="tip-e">—</span>
  </div>
</div>

<script type="module">
import * as THREE          from 'three';
import { OrbitControls }  from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader }     from 'three/addons/loaders/GLTFLoader.js';
import wasmInit, { parse_atlas_id } from './atlas-id-parser/pkg/atlas_id_parser.js';

// ── Live poller (graceful if unavailable) ─────────────────────────────────────
let LivePoller = null;
try {
  ({ LivePoller } = await import('./live_atlas/live_cern/live_poller.js'));
} catch (_) { /* offline-only mode */ }

// ── Constants ─────────────────────────────────────────────────────────────────
const PAL_N      = 4096;   // palette steps
const DEF_THR    = 200;    // default threshold MeV
const LOG_FLOOR  = 1;      // log scale base (MeV)

// ── State ─────────────────────────────────────────────────────────────────────
const meshByName = new Map();    // CGV path → THREE.Mesh
const origMat    = new Map();    // CGV path → original material
let   active     = new Map();    // CGV path → { energyGev, energyMev, cellName }
let   rayTargets = [];           // cached visible mesh array for raycasting

let   eMaxMev     = 1;           // current event max energy
let   thrMev      = DEF_THR;     // persisted threshold across events
let   wasmOk      = false;
let   sceneOk     = false;
let   dirty       = true;        // render-on-demand flag
let   curEvtId    = null;        // currently displayed event id
let   isLive      = true;

// ── Palette (4096 steps, jet colormap: blue → cyan → green → yellow → red) ──
const PAL = Array.from({ length: PAL_N }, (_, i) => {
  const t = i / (PAL_N - 1);
  const r = Math.min(1, Math.max(0, 2 * t - 1));
  const g = Math.min(1, Math.max(0, 1 - Math.abs(2 * t - 1)));
  const b = Math.min(1, Math.max(0, 1 - 2 * t));
  return new THREE.MeshLambertMaterial({
    color:       new THREE.Color(r, g, b),
    transparent: true,
    opacity:     0.86,
    side:        THREE.DoubleSide,
  });
});

function palMat(eMev, lo, hi) {
  const t   = hi > lo ? (eMev - lo) / (hi - lo) : 0.5;
  const idx = Math.round(Math.max(0, Math.min(PAL_N - 1, t * (PAL_N - 1))));
  return PAL[idx];
}

// ── Renderer ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({
  canvas,
  antialias:       true,
  powerPreference: 'high-performance',
  precision:       'highp',
});
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;

// ── Scene / Camera / Controls ─────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x01192e);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 10, 100_000);
camera.position.set(0, 0, 12_000);

const controls = new OrbitControls(camera, canvas);
controls.enableDamping = true;
controls.dampingFactor = 0.055;
controls.zoomSpeed     = 1.2;
controls.addEventListener('change', () => {
  dirty = true;
  tooltip.hidden = true;
  clearOutline();
});

// ── Lighting ──────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const key  = new THREE.DirectionalLight(0xffffff, 0.95);
key.position.set(600, 1500, 1000);
scene.add(key);
const fill = new THREE.DirectionalLight(0x5577ff, 0.28);
fill.position.set(-800, -400, 600);
scene.add(fill);

// ── Render loop (dirty flag) ──────────────────────────────────────────────────
(function loop() {
  requestAnimationFrame(loop);
  controls.update();
  if (!dirty) return;
  renderer.render(scene, camera);
  dirty = false;
})();

window.addEventListener('resize', () => {
  renderer.setSize(innerWidth, innerHeight);
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  dirty = true;
});

// ── Status ────────────────────────────────────────────────────────────────────
const statusEl = document.getElementById('statusbar');
const setStatus = h => { statusEl.innerHTML = h; };

function checkReady() {
  if (!wasmOk || !sceneOk) return;
  setStatus('Ready — waiting for event…');
  if (isLive && poller) {
    poller.start();
    // Load most recent cached event if any
    const list = poller.getList();
    if (list.length > 0) { curEvtId = list[0].id; processXml(list[0].text); renderEvtList(); }
  }
}

// ── GLB ───────────────────────────────────────────────────────────────────────
new GLTFLoader().load(
  'CaloGeometry.glb',
  ({ scene: g }) => {
    g.traverse(o => {
      if (!o.isMesh) return;
      o.visible = false;
      meshByName.set(o.name, o);
      origMat.set(o.name, o.material);
    });
    scene.add(g);
    sceneOk = true;
    dirty   = true;
    checkReady();
  },
  x => { if (x.total) setStatus(`Loading geometry: ${Math.round(x.loaded/x.total*100)} %`); },
  () => {
    setStatus('<span class="warn">CaloGeometry.glb not found — run root2scene.mjs first.</span>');
    sceneOk = true;
    checkReady();
  }
);

// ── WASM ──────────────────────────────────────────────────────────────────────
wasmInit()
  .then(() => { wasmOk = true; checkReady(); })
  .catch(e  => setStatus(`<span class="err">WASM error: ${esc(e.message)}</span>`));

// ── TILECAL mapping ───────────────────────────────────────────────────────────
function compX(sec, samp, tow) {
  if (sec < 3) {
    if (samp === 0) return sec === 1 ?  1 :  5;
    if (samp === 1) return sec === 1 ? 23 :  6;
    if (samp === 2) return sec === 1 ?  4 :  7;
  } else {
    if (tow ===  8) return  8; if (tow ===  9) return  9;
    if (tow === 10) return 10; if (tow === 11) return 11;
    if (tow === 13) return 12; if (tow === 15) return 13;
  }
  return null;
}

function compK(tow, samp, x) {
  if (tow < 8) return samp === 2 ? Math.floor(tow / 2) : tow;
  if (tow ===  8) { return (x===0||x===1) ? 8 : 0; }
  if (tow ===  9) { if (x===1) return 9; if (x===9) return 0; return null; }
  if (tow === 10) return 0;
  if (tow === 11) { if (x===11||x===5) return 0; if (x===6) return 1; return null; }
  if (tow === 12) { if (x===5) return 1; if (x===6) return 2; if (x===7) return 1; return null; }
  if (tow === 13) { if (x===12) return 0; if (x===5) return 2; if (x===6) return 3; return null; }
  if (tow === 14) { if (x===5) return 3; if (x===6) return 4; return null; }
  if (tow === 15) { if (x===13) return 0; if (x===5) return 4; return null; }
  return null;
}

function cellLabel(x, k) {
  switch (x) {
    case  1: return `A${k+1}`;    case 23: return `BC${k+1}`;
    case  4: return `D${k}`;      case  5: return `A${k+12}`;
    case  6: return `B${k+11}`;   case  7: return `D${k+5}`;
    case  8: return 'D4';         case  9: return 'C10';
    case 10: return 'E1';         case 11: return 'E2';
    case 12: return 'E3';         case 13: return 'E4';
    default: return '?';
  }
}

// ── XML parser ────────────────────────────────────────────────────────────────
function parseTile(xmlText) {
  const doc = new DOMParser().parseFromString(xmlText, 'application/xml');
  const pe  = doc.querySelector('parsererror');
  if (pe) throw new Error('XML parse error: ' + pe.textContent.slice(0, 120));
  const tiles = [...doc.getElementsByTagName('TILE')];
  if (!tiles.length) throw new Error('No <TILE> element found');
  const cells = [];
  for (const tile of tiles) {
    let n = 0;
    for (const ch of tile.children) {
      const id = ch.getAttribute('id') ?? ch.getAttribute('cellID');
      const ev = ch.getAttribute('energy') ?? ch.getAttribute('e');
      if (id && ev) { const e = parseFloat(ev); if (isFinite(e)) { cells.push({ id: id.trim(), energy: e }); n++; } }
    }
    if (n) continue;
    const idEl = tile.querySelector('id, cellID');
    const eEl  = tile.querySelector('energy, e');
    if (idEl && eEl) {
      const ids = idEl.textContent.trim().split(/\s+/);
      const ens = eEl.textContent.trim().split(/\s+/).map(Number);
      const m   = Math.min(ids.length, ens.length);
      for (let i = 0; i < m; i++) if (ids[i] && isFinite(ens[i])) cells.push({ id: ids[i], energy: ens[i] });
    }
  }
  return cells;
}

// ── Scene reset ───────────────────────────────────────────────────────────────
function resetScene() {
  for (const [name, mesh] of meshByName) {
    mesh.visible  = false;
    mesh.material = origMat.get(name) ?? mesh.material;
  }
  active.clear();
  rayTargets = [];
  clearOutline();
  document.getElementById('slider-wrap').hidden = true;
  tooltip.hidden = true;
  dirty = true;
}

// ── Threshold ─────────────────────────────────────────────────────────────────
function applyThreshold(mev) {
  rayTargets = [];
  for (const [name, { energyMev }] of active) {
    const mesh = meshByName.get(name);
    if (!mesh) continue;
    const vis = !isFinite(mev) || energyMev >= mev;
    mesh.visible = vis;
    if (vis) rayTargets.push(mesh);
  }
  dirty = true;
}

// ── Process XML ───────────────────────────────────────────────────────────────
function processXml(xmlText) {
  if (!wasmOk) return;
  let cells;
  try { cells = parseTile(xmlText); }
  catch (e) { setStatus(`<span class="err">${esc(e.message)}</span>`); return; }
  if (!cells.length) { setStatus('<span class="warn">No TILE cells found</span>'); return; }

  setStatus(`Decoding ${cells.length} cells…`);
  resetScene();

  const mevs = cells.map(c => c.energy * 1000).filter(isFinite);
  const eMin = Math.min(...mevs);
  eMaxMev    = Math.max(...mevs);

  let nHit = 0, nMiss = 0, nSkip = 0;
  for (const { id, energy } of cells) {
    const eMev = energy * 1000;
    let p;
    try { p = parse_atlas_id(id); } catch { nSkip++; continue; }
    if (!p?.valid || p.subsystem !== 'TILECAL') { nSkip++; continue; }
    const f = Object.fromEntries(p.fields.map(({ name, value }) => [name, value]));
    const x = compX(f.section, f.sampling, f.tower); if (x === null) { nMiss++; continue; }
    const k = compK(f.tower, f.sampling, x);         if (k === null) { nMiss++; continue; }
    const y    = f.side < 0 ? 'p' : 'n';
    const path = `Calorimeter\u2192Tile${x}${y}_0\u2192Tile${x}${y}${k}_${k}\u2192cell_${f.module}`;
    const mesh = meshByName.get(path);
    if (!mesh) { nMiss++; continue; }
    mesh.material = palMat(eMev, eMin, eMaxMev);
    mesh.visible  = true;
    active.set(path, { energyGev: energy, energyMev: eMev, cellName: cellLabel(x, k) });
    nHit++;
  }

  initSlider(eMin, eMaxMev);
  applyThreshold(thrMev);

  setStatus(
    `<span class="ok">${nHit} cells</span>` +
    (nMiss ? ` · <span class="warn">${nMiss} unmapped</span>` : '') +
    ` · E: ${fmtMev(eMin)} – ${fmtMev(eMaxMev)}`
  );
}

// ── Slider ────────────────────────────────────────────────────────────────────
const strak   = document.getElementById('strak');
const sthumb  = document.getElementById('sthumb');
const sthlbl  = document.getElementById('sthlbl');
const scur    = document.getElementById('scur');
let   sdrag   = false;

function mevToRatio(mev) {
  if (!isFinite(mev) || mev <= LOG_FLOOR || eMaxMev <= LOG_FLOOR) return 0;
  return Math.max(0, Math.min(1, Math.log(mev / LOG_FLOOR) / Math.log(eMaxMev / LOG_FLOOR)));
}
function ratioToMev(r) {
  if (r <= 0) return -Infinity;
  return LOG_FLOOR * Math.pow(eMaxMev / LOG_FLOOR, Math.min(1, r));
}

function placeThumb(r) {
  sthumb.style.top = ((1 - r) * 100) + '%';
}

function updateSliderUI(mev) {
  const lbl = !isFinite(mev) ? 'ALL' : fmtMev(mev);
  sthlbl.textContent = lbl;
  scur.textContent   = lbl;
  placeThumb(mevToRatio(mev));
}

function initSlider(eMin, eMax) {
  document.getElementById('smax').textContent = fmtMev(eMax);
  document.getElementById('smin').textContent = fmtMev(eMin);
  // Clamp persisted threshold to current event's max; if above max, reset to default
  if (isFinite(thrMev) && thrMev > eMax) thrMev = Math.min(DEF_THR, eMax);
  updateSliderUI(thrMev);
  document.getElementById('slider-wrap').hidden = false;
}

function sliderRatioFromPtr(e) {
  const rect = strak.getBoundingClientRect();
  const y    = (e.clientY ?? e.touches?.[0]?.clientY ?? 0) - rect.top;
  return 1 - Math.max(0, Math.min(1, y / rect.height));
}

strak.addEventListener('pointerdown', e => {
  sdrag = true;
  strak.setPointerCapture(e.pointerId);
  const r = sliderRatioFromPtr(e);
  thrMev  = ratioToMev(r);
  updateSliderUI(thrMev);
  applyThreshold(thrMev);
});
strak.addEventListener('pointermove', e => {
  if (!sdrag) return;
  const r = sliderRatioFromPtr(e);
  thrMev  = ratioToMev(r);
  updateSliderUI(thrMev);
  applyThreshold(thrMev);
});
strak.addEventListener('pointerup',     () => { sdrag = false; });
strak.addEventListener('pointercancel', () => { sdrag = false; });

// ── Outline (EdgesGeometry) ───────────────────────────────────────────────────
const eGeoCache  = new Map();  // geometry.uuid → THREE.EdgesGeometry
const outlineMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
let   outlineMesh = null;

function clearOutline() {
  if (!outlineMesh) return;
  scene.remove(outlineMesh);
  outlineMesh = null;
  dirty = true;
}

function showOutline(mesh) {
  if (outlineMesh?.userData.src === mesh.name) return;
  clearOutline();
  mesh.updateWorldMatrix(true, false);
  const uid = mesh.geometry.uuid;
  if (!eGeoCache.has(uid)) eGeoCache.set(uid, new THREE.EdgesGeometry(mesh.geometry, 15));
  outlineMesh = new THREE.LineSegments(eGeoCache.get(uid), outlineMat);
  outlineMesh.matrix.copy(mesh.matrixWorld);
  outlineMesh.matrixAutoUpdate = false;
  outlineMesh.renderOrder = 999;
  outlineMesh.userData.src = mesh.name;
  scene.add(outlineMesh);
  dirty = true;
}

// ── Hover tooltip + outline ───────────────────────────────────────────────────
const raycast  = new THREE.Raycaster();
const mxy      = new THREE.Vector2();
const tooltip  = document.getElementById('tip');
let   lastRay  = 0;

canvas.addEventListener('mousemove', e => {
  const now = Date.now();
  if (now - lastRay < 34) return;
  lastRay = now;

  if (!active.size) { tooltip.hidden = true; clearOutline(); return; }

  mxy.set((e.clientX / innerWidth) * 2 - 1, -(e.clientY / innerHeight) * 2 + 1);
  raycast.setFromCamera(mxy, camera);
  const hits = raycast.intersectObjects(rayTargets, false);

  if (hits.length) {
    const data = active.get(hits[0].object.name);
    if (data) {
      showOutline(hits[0].object);
      document.getElementById('tip-cell').textContent = data.cellName;
      document.getElementById('tip-e').textContent    = `${data.energyGev.toFixed(4)} GeV`;
      tooltip.style.left = Math.min(e.clientX + 18, innerWidth  - 185) + 'px';
      tooltip.style.top  = Math.min(e.clientY + 18, innerHeight -  85) + 'px';
      tooltip.hidden = false;
    }
  } else {
    clearOutline();
    tooltip.hidden = true;
  }
});
canvas.addEventListener('mouseleave', () => { clearOutline(); tooltip.hidden = true; });

// ── Mode toggle ───────────────────────────────────────────────────────────────
document.getElementById('btn-live').addEventListener('click', () => {
  if (isLive) return;
  isLive = true;
  document.getElementById('btn-live').classList.add('on');
  document.getElementById('btn-local').classList.remove('on');
  document.getElementById('live-sec').hidden  = false;
  document.getElementById('local-sec').hidden = true;
  if (poller && wasmOk && sceneOk) poller.start();
});

document.getElementById('btn-local').addEventListener('click', () => {
  if (!isLive) return;
  isLive = false;
  document.getElementById('btn-local').classList.add('on');
  document.getElementById('btn-live').classList.remove('on');
  document.getElementById('local-sec').hidden = false;
  document.getElementById('live-sec').hidden  = true;
  if (poller) { poller.stop(); setLiveDot('stopped'); }
});

// ── LivePoller ────────────────────────────────────────────────────────────────
let poller = null;
if (LivePoller) poller = new LivePoller();

function setLiveDot(state) {
  const dot = document.getElementById('ldot');
  const txt = document.getElementById('live-txt');
  dot.className = 'ldot';
  switch (state) {
    case 'polling':     dot.classList.add('ok', 'pulse'); txt.textContent = 'Polling…'; break;
    case 'same':        dot.classList.add('ok');          txt.textContent = 'Up to date'; break;
    case 'downloading': dot.classList.add('dl', 'pulse'); txt.textContent = 'Fetching…'; break;
    case 'error':       dot.classList.add('err');         txt.textContent = 'Error'; break;
    default:            txt.textContent = 'Stopped';
  }
}

const SVG_DL = `<svg class="ic"><use href="#i-dl"/></svg>`;

function relTime(ts) {
  const s = (Date.now() - ts) / 1000;
  if (s < 10)    return 'just now';
  if (s < 60)    return `${Math.floor(s)} s ago`;
  if (s < 3600)  return `${Math.floor(s / 60)} min ago`;
  return `${Math.floor(s / 3600)} h ago`;
}

function renderEvtList() {
  const list = poller ? poller.getList() : [];
  const el   = document.getElementById('evt-list');
  el.innerHTML = '';
  list.forEach((entry, idx) => {
    const row = document.createElement('div');
    row.className = 'erow' + (entry.id === curEvtId ? ' cur' : '');
    row.innerHTML = `
      <div class="einfo">
        <div class="ename">${esc(entry.name)}</div>
        <div class="etime" data-ts="${entry.timestamp}">${relTime(entry.timestamp)}</div>
      </div>
      <button class="edl" title="Download XML">${SVG_DL}</button>`;
    row.querySelector('.einfo').addEventListener('click', () => {
      curEvtId = entry.id;
      processXml(entry.text);
      renderEvtList();
    });
    row.querySelector('.edl').addEventListener('click', ev => {
      ev.stopPropagation();
      poller.download(idx);
    });
    el.appendChild(row);
  });
}

// Refresh relative timestamps every 30 s
setInterval(() => {
  for (const el of document.querySelectorAll('.etime[data-ts]'))
    el.textContent = relTime(+el.dataset.ts);
}, 30_000);

if (poller) {
  poller.addEventListener('newxml', ({ detail: { entry } }) => {
    curEvtId = entry.id;
    processXml(entry.text);
    renderEvtList();
  });
  poller.addEventListener('listupdate', renderEvtList);
  poller.addEventListener('status', ({ detail: { state } }) => setLiveDot(state));
  poller.addEventListener('error',  ({ detail }) => console.warn('[LivePoller]', detail.message));

  // Restore cached events from browser Cache API
  poller.init().then(() => renderEvtList()).catch(() => {});
} else {
  // LivePoller not available → switch to local mode silently
  document.getElementById('btn-local').click();
}

// Play / Stop buttons
document.getElementById('ibtn-play').addEventListener('click', () => {
  if (!poller) return;
  poller.start();
  document.getElementById('ibtn-play').hidden = true;
  document.getElementById('ibtn-stop').hidden = false;
});
document.getElementById('ibtn-stop').addEventListener('click', () => {
  if (!poller) return;
  poller.stop();
  document.getElementById('ibtn-stop').hidden = true;
  document.getElementById('ibtn-play').hidden = false;
  setLiveDot('stopped');
});

// ── File input (local mode) ───────────────────────────────────────────────────
document.getElementById('file-in').addEventListener('change', async e => {
  const f = e.target.files?.[0];
  if (f) { setStatus('Parsing…'); processXml(await f.text()); }
  e.target.value = '';
});

// ── Utilities ─────────────────────────────────────────────────────────────────
function fmtMev(v) {
  if (!isFinite(v)) return 'ALL';
  const a = Math.abs(v);
  if (a >= 1000) return `${(v / 1000).toPrecision(3)} GeV`;
  if (a >= 1)    return `${v.toFixed(1)} MeV`;
  return `${v.toFixed(3)} MeV`;
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
