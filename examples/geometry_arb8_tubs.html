<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>TUBS vs ARB8</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; color: white; font-family: sans-serif; }
        #info { position: absolute; top: 10px; width: 100%; text-align: center; pointer-events: none; }
    </style>
</head>
<body>
    <div id="info">
        <h2>Esquerda: TUBS (Arcos Curvos) &nbsp;&nbsp;&nbsp; | &nbsp;&nbsp;&nbsp; Direita: ARB8 (Faces Retas)</h2>
        <p>Clique e arraste para girar a câmera. Note as linhas pretas (Wireframe).</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 1. Configuração Básica da Cena
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 15, 15);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);

        // Luzes para dar volume
        scene.add(new THREE.AmbientLight(0x404040, 2.0));
        const light = new THREE.DirectionalLight(0xffffff, 2.0);
        light.position.set(10, 20, 10);
        scene.add(light);

        // --- PARÂMETROS DA CÉLULA ---
        const rIn = 3.0;     // Raio interno
        const rOut = 6.0;    // Raio externo
        const angle = 0.5;   // Ângulo de abertura (radianos)
        const height = 4.0;  // Altura em Z

        // ==========================================================
        // GEOMETRIA 1: TUBS (Cilíndrica com arcos) - AZUL
        // ==========================================================
        const shape = new THREE.Shape();
        shape.moveTo(rIn, 0);
        shape.lineTo(rOut, 0);
        shape.absarc(0, 0, rOut, 0, angle, false); // Arco externo curvo
        shape.lineTo(rIn * Math.cos(angle), rIn * Math.sin(angle));
        shape.absarc(0, 0, rIn, angle, 0, true);   // Arco interno curvo

        const tubsGeo = new THREE.ExtrudeGeometry(shape, {
            depth: height,
            curveSegments: 16, // A curva é feita de 16 micro-retas
            bevelEnabled: false
        });
        
        // Centralizando o Z e ajustando posição
        tubsGeo.translate(0, 0, -height / 2);
        tubsGeo.rotateX(-Math.PI / 2);

        const tubsMat = new THREE.MeshPhongMaterial({ color: 0x0088ff, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1 });
        const tubsMesh = new THREE.Mesh(tubsGeo, tubsMat);
        tubsMesh.position.x = -4; // Joga para a esquerda
        scene.add(tubsMesh);

        // Linhas pretas do TUBS
        const tubsWire = new THREE.LineSegments(new THREE.EdgesGeometry(tubsGeo), new THREE.LineBasicMaterial({ color: 0x000000 }));
        tubsMesh.add(tubsWire);


        // ==========================================================
        // GEOMETRIA 2: ARB8 (Trapézio de faces retas) - LARANJA
        // ==========================================================
        // O ARB8 liga os 8 pontos extremos ignorando a curva.
        const v0 = [rIn, 0, -height/2];
        const v1 = [rOut, 0, -height/2];
        const v2 = [rOut * Math.cos(angle), rOut * Math.sin(angle), -height/2];
        const v3 = [rIn * Math.cos(angle), rIn * Math.sin(angle), -height/2];
        
        const v4 = [rIn, 0, height/2];
        const v5 = [rOut, 0, height/2];
        const v6 = [rOut * Math.cos(angle), rOut * Math.sin(angle), height/2];
        const v7 = [rIn * Math.cos(angle), rIn * Math.sin(angle), height/2];

        // Construindo os triângulos manualmente (2 por face reta)
        const vertices = new Float32Array([
            ...v0, ...v1, ...v2,  ...v0, ...v2, ...v3, // Base inferior
            ...v4, ...v6, ...v5,  ...v4, ...v7, ...v6, // Base superior
            ...v0, ...v4, ...v5,  ...v0, ...v5, ...v1, // Face lateral direita
            ...v3, ...v6, ...v7,  ...v3, ...v2, ...v6, // Face lateral esquerda
            ...v1, ...v5, ...v6,  ...v1, ...v6, ...v2, // Face EXTERNA RETA (Ignora o arco)
            ...v0, ...v3, ...v7,  ...v0, ...v7, ...v4  // Face INTERNA RETA (Ignora o arco)
        ]);

        const arb8Geo = new THREE.BufferGeometry();
        arb8Geo.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
        arb8Geo.computeVertexNormals(); // Calcula a luz
        arb8Geo.rotateX(-Math.PI / 2);

        const arb8Mat = new THREE.MeshPhongMaterial({ color: 0xff8800, polygonOffset: true, polygonOffsetFactor: 1, polygonOffsetUnits: 1 });
        const arb8Mesh = new THREE.Mesh(arb8Geo, arb8Mat);
        arb8Mesh.position.x = 2; // Joga para a direita
        scene.add(arb8Mesh);

        // Linhas pretas do ARB8
        const arb8Wire = new THREE.LineSegments(new THREE.EdgesGeometry(arb8Geo), new THREE.LineBasicMaterial({ color: 0x000000 }));
        arb8Mesh.add(arb8Wire);

        // Loop de Animação
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Ajusta o tamanho se a janela mudar
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
