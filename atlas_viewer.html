<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TileCal Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;1,300&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
/* ── Reset & base ──────────────────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  background:#030c18;
  color:#c8daea;
  font-family:'Inter', system-ui, sans-serif;
  font-size:13px;
  line-height:1.55;
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
canvas { display:block; }

/* ── Loading overlay ───────────────────────────────────────────────────── */
#overlay {
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  background:#030c18; gap:18px; z-index:10;
}
#overlay-title {
  display:flex; align-items:center; gap:10px;
  font-family:'Space Mono', monospace;
  font-size:15px; font-weight:700; letter-spacing:.22em; color:#7aa8cc;
}
#overlay-title .material-icons-round { font-size:20px; color:#2e6098; }
#overlay-msg {
  font-size:11px; color:#274460;
  letter-spacing:.1em; font-family:'Space Mono', monospace;
}
#bar { width:240px; height:1px; background:#06141f; overflow:hidden; }
#prog { height:100%; background:linear-gradient(90deg,#0c2a54,#3680d4); width:0; transition:width .25s ease; }

/* ── Card shell ────────────────────────────────────────────────────────── */
.card {
  position:fixed;
  background:rgba(3,11,22,.96);
  border:1px solid #0c1e38;
  border-radius:10px;
  min-width:246px;
  backdrop-filter:blur(18px);
  -webkit-backdrop-filter:blur(18px);
  transition:border-color .3s ease, box-shadow .3s ease, opacity .7s ease;
}
.card:hover {
  border-color:#18305c;
  box-shadow:0 8px 40px rgba(4,18,48,.55);
}

.card-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:13px 16px;
  cursor:pointer; user-select:none;
}
.card-title {
  display:flex; align-items:center; gap:8px;
  font-family:'Space Mono', monospace;
  font-size:9px; font-weight:700;
  letter-spacing:.22em; text-transform:uppercase;
  color:#274a68;
}
.card-title .material-icons-round { font-size:14px; color:#1e3e58; }
.card-chevron {
  display:flex; align-items:center;
  color:#122438;
  transition:transform .32s ease, color .2s;
}
.card-chevron .material-icons-round { font-size:17px; }
.card-chevron.open { transform:rotate(180deg); }
.card-header:hover .card-chevron { color:#3a6a98; }

.card-body {
  max-height:600px; opacity:1;
  padding:2px 16px 16px;
  transition:max-height .38s ease, opacity .3s ease, padding-bottom .38s ease;
  overflow:hidden;
}
.card-body.collapsed { max-height:0; opacity:0; padding-bottom:0; }

/* ── Row ───────────────────────────────────────────────────────────────── */
.row {
  display:flex; justify-content:space-between; align-items:baseline;
  padding:6px 0;
  border-bottom:1px solid #071426;
}
.row:last-of-type { border-bottom:none; }
.row .lbl {
  font-size:12px; color:#2e506a;
  font-weight:400; letter-spacing:.01em;
}
.row .val {
  font-family:'Space Mono', monospace;
  font-size:12px; color:#7ab0cc; font-weight:400;
}

/* ── Card divider ──────────────────────────────────────────────────────── */
.cdiv { height:1px; background:#071426; margin:10px 0 8px; }

/* ── Buttons ───────────────────────────────────────────────────────────── */
.btns { display:flex; flex-wrap:wrap; gap:6px; }
.btn {
  display:inline-flex; align-items:center; gap:5px;
  background:transparent; border:1px solid #0e2442;
  color:#2e5878; padding:6px 11px; border-radius:6px;
  cursor:pointer;
  font:500 12px/1 'Inter', sans-serif;
  letter-spacing:.01em;
  transition:background .2s, border-color .2s, color .2s;
  white-space:nowrap;
}
.btn .material-icons-round { font-size:14px; }
.btn:hover { background:#071628; border-color:#1e3e70; color:#6898c0; }
.btn.active {
  background:#081e3c; border-color:#2a5888;
  color:#78aace;
}
.btn.active:hover { background:#0c2848; }

.nav-hint {
  margin-top:11px;
  font-size:10px; color:#0e2036; letter-spacing:.07em;
  font-family:'Space Mono', monospace; font-style:italic;
}

/* ── Cell info tooltip ─────────────────────────────────────────────────── */
#cell-tip {
  position:fixed; pointer-events:none; z-index:30;
  background:rgba(3,11,22,.98);
  border:1px solid #1a3c6c;
  border-radius:9px;
  padding:14px 18px;
  opacity:0; transition:opacity .14s ease;
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  white-space:nowrap;
  min-width:200px;
}
#cell-tip.show { opacity:1; }

.tip-sect { font-size:9px; letter-spacing:.16em; color:#234a6a; text-transform:uppercase; margin-bottom:4px; }
.tip-energy-val { font-family:'Space Mono', monospace; font-size:22px; font-weight:700; color:#90c4e0; line-height:1.1; }
.tip-energy-unit { font-family:'Space Mono', monospace; font-size:11px; color:#2e5878; margin-top:2px; margin-bottom:12px; }
.tip-div { height:1px; background:#0c2040; margin:10px 0; }
.tip-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px 10px; }
.tip-field label { display:block; font-size:9px; letter-spacing:.12em; color:#234a6a; text-transform:uppercase; margin-bottom:3px; }
.tip-field span { font-family:'Space Mono', monospace; font-size:13px; color:#7ab0cc; }

/* ── Threshold panel ───────────────────────────────────────────────────── */
#thr-panel {
  position:fixed; right:22px; top:50%; transform:translateY(-50%);
  display:flex; flex-direction:column; align-items:center; gap:12px;
  opacity:.11; transition:opacity .5s ease;
  z-index:5; padding:12px 6px;
}
#thr-panel:hover { opacity:1; }

.thr-lbl {
  font-family:'Space Mono', monospace;
  font-size:8px; letter-spacing:.16em; color:#274460; text-transform:uppercase;
  writing-mode:vertical-rl; transform:rotate(180deg);
}
.slider-wrap {
  height:220px; width:34px;
  position:relative; flex-shrink:0;
}
#thr-slider {
  width:220px;
  position:absolute; left:50%; top:50%;
  transform:translate(-50%,-50%) rotate(-90deg);
  -webkit-appearance:none; appearance:none;
  height:3px; border-radius:2px; outline:none; cursor:pointer;
  background:linear-gradient(90deg,#091e3e,#3680d4);
}
#thr-slider::-webkit-slider-thumb {
  -webkit-appearance:none;
  width:17px; height:17px; border-radius:50%;
  background:#2e78c8; border:2px solid #030c18;
  box-shadow:0 0 12px rgba(46,120,200,.65);
  cursor:pointer;
}
#thr-slider::-moz-range-thumb {
  width:17px; height:17px; border-radius:50%;
  background:#2e78c8; border:2px solid #030c18;
  box-shadow:0 0 12px rgba(46,120,200,.65);
  cursor:pointer;
}
#thr-val {
  font-family:'Space Mono', monospace;
  font-size:9px; color:#274460;
  writing-mode:vertical-rl; transform:rotate(180deg);
}

/* ── Threshold cursor (follows mouse during drag) ──────────────────────── */
#thr-cursor {
  position:fixed; pointer-events:none; z-index:50;
  background:rgba(3,11,22,.98);
  border:1px solid #2a5a8c;
  border-radius:6px;
  padding:6px 11px;
  font-family:'Space Mono', monospace;
  font-size:13px; color:#7ab4d4;
  opacity:0; transition:opacity .08s;
  white-space:nowrap; letter-spacing:.03em;
}
#thr-cursor.show { opacity:1; }

/* ── Cinema exit ───────────────────────────────────────────────────────── */
#cinema-exit {
  position:fixed; bottom:24px; right:24px;
  z-index:20;
  opacity:0; pointer-events:none;
  transition:opacity .5s ease;
}

/* ── Cinema mode ───────────────────────────────────────────────────────── */
body.cinema .card,
body.cinema #thr-panel { opacity:0 !important; pointer-events:none; }
body.cinema #cell-tip  { opacity:0 !important; }
body.cinema #cinema-exit { opacity:.22; pointer-events:auto; }
body.cinema #cinema-exit:hover { opacity:1; }
</style>
</head>
<body>

<!-- ── Loading ────────────────────────────────────────────────────────────── -->
<div id="overlay">
  <div id="overlay-title">
    <span class="material-icons-round">radar</span>
    TILECAL VIEWER
  </div>
  <div id="overlay-msg">Iniciando…</div>
  <div id="bar"><div id="prog"></div></div>
</div>

<!-- ── HUD card ───────────────────────────────────────────────────────────── -->
<div id="hud" class="card" style="top:16px;left:16px;display:none">
  <div class="card-header" onclick="toggleCard('hud')">
    <div class="card-title">
      <span class="material-icons-round">analytics</span>ATLAS TileCal
    </div>
    <div class="card-chevron open" id="hud-chev">
      <span class="material-icons-round">expand_more</span>
    </div>
  </div>
  <div class="card-body" id="hud-body">
    <div class="row"><span class="lbl">Células totais</span><span class="val" id="s-total">–</span></div>
    <div class="row"><span class="lbl">Células ativas</span><span class="val" id="s-active">–</span></div>
    <div class="row"><span class="lbl">E min / max</span>   <span class="val" id="s-erange">–</span></div>
    <div class="row"><span class="lbl">FPS</span>           <span class="val" id="s-fps">–</span></div>
    <div class="cdiv"></div>
    <div class="btns">
      <button class="btn" id="wf-btn" onclick="toggleWf()">
        <span class="material-icons-round">grid_on</span>Wireframe
      </button>
      <button class="btn" onclick="controls.reset()" title="Reset câmera">
        <span class="material-icons-round">filter_center_focus</span>
      </button>
      <button class="btn" onclick="clearEvt()" title="Limpar evento">
        <span class="material-icons-round">layers_clear</span>
      </button>
      <button class="btn active" id="info-btn" onclick="toggleInfo()" title="Toggle info ao hover">
        <span class="material-icons-round">info</span>
      </button>
      <button class="btn" onclick="enterCinema()" title="Modo cinema">
        <span class="material-icons-round">theaters</span>
      </button>
    </div>
    <div class="nav-hint">drag · scroll · R-drag</div>
  </div>
</div>

<!-- ── Event card ─────────────────────────────────────────────────────────── -->
<div id="evt" class="card" style="bottom:16px;left:16px;display:none">
  <div class="card-header" onclick="toggleCard('evt')">
    <div class="card-title">
      <span class="material-icons-round">bolt</span>Evento de Colisão
    </div>
    <div class="card-chevron open" id="evt-chev">
      <span class="material-icons-round">expand_more</span>
    </div>
  </div>
  <div class="card-body" id="evt-body">
    <div style="margin-bottom:12px">
      <button class="btn" onclick="document.getElementById('fi').click()">
        <span class="material-icons-round">upload_file</span>Carregar XML
      </button>
      <input id="fi" type="file" accept=".xml" style="display:none">
    </div>
    <div class="row"><span class="lbl">Arquivo</span>        <span class="val" id="ep-name">–</span></div>
    <div class="row"><span class="lbl">count declarado</span><span class="val" id="ep-cdecl">–</span></div>
    <div class="row"><span class="lbl">count real</span>     <span class="val" id="ep-cact">–</span></div>
    <div class="row"><span class="lbl">match</span>          <span class="val" id="ep-match">–</span></div>
  </div>
</div>

<!-- ── Cell info tooltip ──────────────────────────────────────────────────── -->
<div id="cell-tip">
  <div class="tip-sect">Energia depositada</div>
  <div class="tip-energy-val" id="tt-e">–</div>
  <div class="tip-energy-unit">GeV</div>
  <div class="tip-div"></div>
  <div class="tip-grid">
    <div class="tip-field"><label>Eta</label><span id="tt-eta">–</span></div>
    <div class="tip-field"><label>Phi</label><span id="tt-phi">–</span></div>
    <div class="tip-field"><label>Sub</label><span id="tt-sub">–</span></div>
  </div>
</div>

<!-- ── Threshold panel ────────────────────────────────────────────────────── -->
<div id="thr-panel">
  <div class="thr-lbl">Threshold</div>
  <div class="slider-wrap">
    <input type="range" id="thr-slider" min="0" max="1" step="0.0001" value="0">
  </div>
  <div id="thr-val">–</div>
</div>

<!-- Cursor value label while dragging -->
<div id="thr-cursor"></div>

<!-- ── Cinema exit ────────────────────────────────────────────────────────── -->
<div id="cinema-exit">
  <button class="btn" onclick="exitCinema()">
    <span class="material-icons-round">close</span>Sair do cinema
  </button>
</div>

<!-- ── Three.js importmap ─────────────────────────────────────────────────── -->
<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE        from 'three';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import init, { load_cgv, process_event } from './wasm/pkg/tile_viz.js';

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ── Scene ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x030c18);
scene.add(new THREE.AmbientLight(0xffffff, 1.3));
const sun = new THREE.DirectionalLight(0xffffff, 1.7);
sun.position.set(1, 2, 1.5); scene.add(sun);
const fill = new THREE.DirectionalLight(0x8899ff, 0.5);
fill.position.set(-1, -1, -1); scene.add(fill);

// ── Camera + Controls ──────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 1, 1e6);
camera.position.set(0, 2000, 6000);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
window.controls = controls;

// ── Global state ───────────────────────────────────────────────────────────────
const meshIndex   = {};
let   hitMats     = [];
let   wfMode      = false;
let   infoEnabled = true;   // whether hover shows tooltip + outline

const meshHitData = new Map();  // mesh → {e_mev, eta, phi, sub}
let   allHits     = [];         // [{mesh, e_mev}]
let   visibleList = [];         // currently visible hit meshes (post-threshold)
let   eMin_mev = 0, eMax_mev = 1;

// Per-hover state
let hoveredMesh  = null;
let outlineClone = null;    // BackSide child of hovered mesh

const baseMat = new THREE.MeshStandardMaterial({
  color:0x0e1c2e, roughness:0.72, metalness:0.08, side:THREE.DoubleSide,
});

// Outline material: vivid cyan (#00E5FF) – outside the red/blue stellar palette
const outlineMat = new THREE.MeshBasicMaterial({ color:0x00E5FF, side:THREE.BackSide });

// ── Saturated stellar colormap ─────────────────────────────────────────────────
// Energies are in MeV; normalization is on raw MeV values.
function stellarColor(e_mev) {
  const range = eMax_mev - eMin_mev;
  const t = range > 1e-10 ? Math.max(0, Math.min(1, (e_mev - eMin_mev) / range)) : 0.5;
  const stops = [
    { t:0.00, r:0.60, g:0.00, b:0.08 },  // deep wine red
    { t:0.26, r:1.00, g:0.42, b:0.00 },  // vivid orange
    { t:0.50, r:1.00, g:0.96, b:0.55 },  // warm bright yellow-white
    { t:0.74, r:0.38, g:0.68, b:1.00 },  // vivid sky blue
    { t:1.00, r:0.00, g:0.08, b:1.00 },  // intense electric blue
  ];
  let i = 0;
  while (i < stops.length - 2 && t > stops[i + 1].t) i++;
  const a = stops[i], b = stops[i + 1];
  const s = (b.t - a.t) > 1e-10 ? (t - a.t) / (b.t - a.t) : 0;
  return {
    r: a.r + s * (b.r - a.r),
    g: a.g + s * (b.g - a.g),
    b: a.b + s * (b.b - a.b),
  };
}

// ── Card collapse ──────────────────────────────────────────────────────────────
window.toggleCard = id => {
  document.getElementById(id + '-body').classList.toggle('collapsed');
  document.getElementById(id + '-chev').classList.toggle('open');
};

// ── Wireframe ──────────────────────────────────────────────────────────────────
window.toggleWf = () => {
  wfMode = !wfMode;
  hitMats.forEach(m => m.wireframe = wfMode);
  const btn = document.getElementById('wf-btn');
  btn.innerHTML = wfMode
    ? '<span class="material-icons-round">view_in_ar</span>Solid'
    : '<span class="material-icons-round">grid_on</span>Wireframe';
};

// ── Clear event ────────────────────────────────────────────────────────────────
window.clearEvt = () => {
  setHovered(null);
  Object.values(meshIndex).forEach(m => { m.visible = false; m.material = baseMat; });
  meshHitData.clear(); allHits = []; hitMats = []; visibleList = [];
  eMin_mev = 0; eMax_mev = 1;
  document.getElementById('s-active').textContent  = '0';
  document.getElementById('s-erange').textContent  = '–';
  document.getElementById('ep-name').textContent   = '–';
  document.getElementById('ep-cdecl').textContent  = '–';
  document.getElementById('ep-cact').textContent   = '–';
  document.getElementById('ep-match').textContent  = '–';
  document.getElementById('thr-val').textContent   = '–';
  const sl = document.getElementById('thr-slider');
  sl.min = 0; sl.max = 1; sl.value = 0;
};

// ── Toggle hover info ──────────────────────────────────────────────────────────
window.toggleInfo = () => {
  infoEnabled = !infoEnabled;
  const btn = document.getElementById('info-btn');
  const ico = btn.querySelector('.material-icons-round');
  if (infoEnabled) {
    btn.classList.add('active');
    ico.textContent = 'info';
    // if hovering, switch to tooltip+outline mode
    if (hoveredMesh && meshHitData.has(hoveredMesh)) {
      if (hoveredMesh.material !== baseMat) hoveredMesh.material.emissiveIntensity = 1;
      showOutline(hoveredMesh);
      fillTooltip(meshHitData.get(hoveredMesh));
      placeTooltip(mouseX, mouseY);
      cellTip.classList.add('show');
    }
  } else {
    btn.classList.remove('active');
    ico.textContent = 'info_outline';
    // if hovering, switch to brighten mode
    if (hoveredMesh) {
      clearOutline();
      cellTip.classList.remove('show');
      if (hoveredMesh.material !== baseMat) hoveredMesh.material.emissiveIntensity = 3.0;
    }
  }
};

// ── Cinema mode ────────────────────────────────────────────────────────────────
window.enterCinema = () => {
  setHovered(null);
  document.body.classList.add('cinema');
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.85;
};
window.exitCinema = () => {
  document.body.classList.remove('cinema');
  controls.autoRotate = false;
};

// ── Outline helpers ────────────────────────────────────────────────────────────
function showOutline(mesh) {
  clearOutline();
  outlineClone = new THREE.Mesh(mesh.geometry, outlineMat);
  outlineClone.scale.setScalar(1.035);
  outlineClone.layers.set(1); // layer 1 → excluded from raycaster
  mesh.add(outlineClone);
}
function clearOutline() {
  if (outlineClone) {
    if (outlineClone.parent) outlineClone.parent.remove(outlineClone);
    outlineClone = null;
  }
}

// ── Hover state machine ────────────────────────────────────────────────────────
function setHovered(mesh) {
  if (mesh === hoveredMesh) return;

  // un-hover previous
  if (hoveredMesh) {
    clearOutline();
    if (hoveredMesh.material !== baseMat) hoveredMesh.material.emissiveIntensity = 1;
    cellTip.classList.remove('show');
  }

  hoveredMesh = mesh;
  if (!mesh) return;

  const data = meshHitData.get(mesh);
  if (!data) return;

  if (infoEnabled) {
    showOutline(mesh);
    fillTooltip(data);
    placeTooltip(mouseX, mouseY);
    cellTip.classList.add('show');
  } else {
    // just brighten
    if (mesh.material !== baseMat) mesh.material.emissiveIntensity = 3.0;
  }
}

// ── Tooltip helpers ────────────────────────────────────────────────────────────
const cellTip = document.getElementById('cell-tip');

function fillTooltip(data) {
  document.getElementById('tt-e').textContent   = (data.e_mev / 1000).toFixed(4);
  document.getElementById('tt-eta').textContent = data.eta.toFixed(4);
  document.getElementById('tt-phi').textContent = data.phi.toFixed(4);
  document.getElementById('tt-sub').textContent = data.sub.toFixed(0);
}
function placeTooltip(x, y) {
  const ttW = 230;
  const flip = x + ttW + 22 > innerWidth;
  cellTip.style.left      = (flip ? x - ttW - 22 : x + 22) + 'px';
  cellTip.style.top       = y + 'px';
  cellTip.style.transform = 'translateY(-50%)';
}

// ── Threshold ──────────────────────────────────────────────────────────────────
const thrSlider = document.getElementById('thr-slider');
const thrValEl  = document.getElementById('thr-val');
const thrCursor = document.getElementById('thr-cursor');
let   thrDragging = false;

function applyThreshold(thr_mev) {
  for (const h of allHits) h.mesh.visible = h.e_mev >= thr_mev;
  visibleList = allHits.filter(h => h.mesh.visible).map(h => h.mesh);
  // if currently hovered cell is now hidden, unhover
  if (hoveredMesh && !hoveredMesh.visible) setHovered(null);
  mouseDirty = true;
  document.getElementById('s-active').textContent = visibleList.length.toLocaleString();
}

thrSlider.addEventListener('mousedown', () => { thrDragging = true; thrCursor.classList.add('show'); });
document.addEventListener('mouseup', () => {
  if (thrDragging) { thrDragging = false; thrCursor.classList.remove('show'); }
});

thrSlider.addEventListener('input', () => {
  const mev = parseFloat(thrSlider.value);
  const gev = mev / 1000;
  thrValEl.textContent  = gev.toExponential(2);
  thrCursor.textContent = gev.toFixed(5) + ' GeV';
  applyThreshold(mev);
});

// ── Raycasting ─────────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouseNDC  = new THREE.Vector2(-9999, -9999);
let   mouseX    = 0, mouseY = 0, mouseDirty = false;

window.addEventListener('mousemove', e => {
  mouseNDC.x =  (e.clientX / innerWidth)  * 2 - 1;
  mouseNDC.y = -(e.clientY / innerHeight) * 2 + 1;
  mouseX = e.clientX; mouseY = e.clientY;
  mouseDirty = true;

  // keep tooltip following cursor over same mesh
  if (hoveredMesh && infoEnabled && !document.body.classList.contains('cinema')) {
    placeTooltip(mouseX, mouseY);
  }
  // keep cursor label following during drag
  if (thrDragging) {
    thrCursor.style.left = (mouseX + 18) + 'px';
    thrCursor.style.top  = (mouseY - 12) + 'px';
  }
});

function updateHover() {
  if (!mouseDirty || document.body.classList.contains('cinema')) return;
  mouseDirty = false;

  if (!visibleList.length) { setHovered(null); return; }

  raycaster.setFromCamera(mouseNDC, camera);
  const hits = raycaster.intersectObjects(visibleList, false);
  setHovered(hits.length ? hits[0].object : null);
}

// ── Initialisation ─────────────────────────────────────────────────────────────
async function initApp() {
  const msg  = document.getElementById('overlay-msg');
  const prog = document.getElementById('prog');

  msg.textContent = 'Carregando WASM…';
  await init();
  prog.style.width = '20%';

  msg.textContent = 'Carregando geometria…';
  const [glbBuf, cgvText] = await Promise.all([
    fetch('./root_file/CaloGeometry.glb').then(r => r.arrayBuffer()),
    fetch('./root_file/CaloGeometry.cgv').then(r => r.text()),
  ]);
  prog.style.width = '60%';

  msg.textContent = 'Indexando células…';
  const cellCount = load_cgv(cgvText);
  prog.style.width = '70%';

  msg.textContent = 'Construindo cena…';
  const gltf = await new Promise((res, rej) => new GLTFLoader().parse(glbBuf, '', res, rej));
  gltf.scene.traverse(obj => {
    if (!obj.isMesh) return;
    obj.material = baseMat;
    obj.visible  = false;
    meshIndex[obj.userData.name ?? obj.name] = obj;
  });
  scene.add(gltf.scene);
  prog.style.width = '90%';

  const box    = new THREE.Box3().setFromObject(gltf.scene);
  const size   = box.getSize(new THREE.Vector3()).length();
  const center = box.getCenter(new THREE.Vector3());
  controls.target.copy(center);
  camera.position.copy(center).addScalar(size * 0.9);
  camera.near = size * 0.001;
  camera.far  = size * 20;
  camera.updateProjectionMatrix();
  controls.update();

  prog.style.width = '100%';
  await new Promise(r => setTimeout(r, 200));

  document.getElementById('s-total').textContent  = cellCount.toLocaleString();
  document.getElementById('s-active').textContent = '0';
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('hud').style.display     = 'block';
  document.getElementById('evt').style.display     = 'block';
}

// ── XML event upload ───────────────────────────────────────────────────────────
document.getElementById('fi').onchange = async e => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('ep-name').textContent = file.name;

  const result = JSON.parse(process_event(await file.text()));
  if (!result.ok) { alert('Erro: ' + result.error); return; }

  document.getElementById('ep-cdecl').textContent = result.count_declared;
  document.getElementById('ep-cact').textContent  = result.count_actual;
  document.getElementById('ep-match').textContent = result.count_ok ? 'sim' : 'não';

  // result.e_min / e_max are in MeV (raw from XML)
  eMin_mev = result.e_min;
  eMax_mev = result.e_max;
  document.getElementById('s-erange').textContent =
    `${(eMin_mev / 1000).toFixed(2)} / ${(eMax_mev / 1000).toFixed(2)} GeV`;

  // Reset
  setHovered(null);
  Object.values(meshIndex).forEach(m => { m.visible = false; m.material = baseMat; });
  meshHitData.clear(); allHits = []; hitMats = []; visibleList = [];

  // Configure slider (internal values in MeV, display in GeV)
  thrSlider.min   = eMin_mev;
  thrSlider.max   = eMax_mev;
  thrSlider.value = eMin_mev;
  thrSlider.step  = Math.max(0.001, (eMax_mev - eMin_mev) / 5000);
  thrValEl.textContent = (eMin_mev / 1000).toExponential(2);

  // Build hit meshes
  for (const h of result.hits) {
    const key  = h.path.replace(/\t→\t/g, '→');
    const mesh = meshIndex[key] ?? meshIndex[h.path];
    if (!mesh) continue;

    mesh.visible = true;
    const col = stellarColor(h.energy); // h.energy in MeV
    const mat = new THREE.MeshStandardMaterial({
      color:     new THREE.Color(col.r, col.g, col.b),
      emissive:  new THREE.Color(col.r * 0.38, col.g * 0.38, col.b * 0.38),
      roughness: 0.32, metalness: 0.18, side: THREE.DoubleSide,
    });
    mesh.material = mat;
    hitMats.push(mat);
    meshHitData.set(mesh, { e_mev: h.energy, eta: h.eta, phi: h.phi, sub: h.sub });
    allHits.push({ mesh, e_mev: h.energy });
  }

  visibleList = allHits.map(h => h.mesh);
  document.getElementById('s-active').textContent = visibleList.length.toLocaleString();
};

// ── Resize ─────────────────────────────────────────────────────────────────────
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Render loop ────────────────────────────────────────────────────────────────
let fc = 0, ft = 0;
(function animate(t) {
  requestAnimationFrame(animate);
  controls.update();
  updateHover();
  renderer.render(scene, camera);
  fc++;
  if (t - ft >= 1000) {
    document.getElementById('s-fps').textContent = fc;
    fc = 0; ft = t;
  }
})(0);

initApp().catch(err => {
  document.getElementById('overlay-msg').textContent = 'Erro: ' + err.message;
  console.error(err);
});
</script>
</body>
