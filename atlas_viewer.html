<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TileCal Viewer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
<style>
/* ── Reset ──────────────────────────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg:          #030b17;
  --surface:     rgba(6,16,32,0.97);
  --border:      rgba(28,58,100,0.45);
  --border-h:    rgba(50,100,170,0.65);
  --accent:      #3b8fd4;
  --accent-dim:  #1d5a96;
  --txt-hi:      #ddeaf6;
  --txt-md:      #7ba8c8;
  --txt-lo:      #3a6080;
  --txt-xlo:     #1e3a52;
  --mono:        'JetBrains Mono', 'Fira Code', monospace;
  --sans:        'Inter', system-ui, sans-serif;
  --r:           10px;
  --r-sm:        7px;
  --shadow:      0 12px 48px rgba(0,0,0,.55);
}

body {
  background: var(--bg);
  color: var(--txt-hi);
  font-family: var(--sans);
  font-size: 14px;
  line-height: 1.6;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}
canvas { display:block; }

/* ── Loading ────────────────────────────────────────────────────────────── */
#overlay {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: var(--bg); gap: 20px; z-index: 10;
}
#overlay-title {
  display: flex; align-items: center; gap: 12px;
  font-family: var(--mono);
  font-size: 13px; font-weight: 500;
  letter-spacing: .2em; color: var(--accent);
}
#overlay-title .material-icons-round { font-size: 22px; }
#overlay-msg {
  font-size: 12px; color: var(--txt-lo);
  letter-spacing: .08em; font-family: var(--mono);
}
#bar {
  width: 260px; height: 2px;
  background: var(--txt-xlo); overflow: hidden; border-radius: 2px;
}
#prog {
  height: 100%;
  background: linear-gradient(90deg, var(--accent-dim), var(--accent));
  width: 0; transition: width .3s ease;
}

/* ── Card ───────────────────────────────────────────────────────────────── */
.card {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  min-width: 256px;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: var(--shadow);
  transition: border-color .25s, box-shadow .25s, opacity .6s;
}
.card:hover {
  border-color: var(--border-h);
  box-shadow: 0 16px 56px rgba(0,0,0,.7);
}

.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  cursor: pointer; user-select: none;
}
.card-title {
  display: flex; align-items: center; gap: 9px;
  font-family: var(--mono);
  font-size: 10px; font-weight: 500;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--txt-lo);
}
.card-title .material-icons-round { font-size: 15px; color: var(--accent-dim); }
.card-chevron {
  color: var(--txt-xlo);
  transition: transform .3s ease, color .2s;
  display: flex; align-items: center;
}
.card-chevron .material-icons-round { font-size: 18px; }
.card-chevron.open { transform: rotate(180deg); }
.card-header:hover .card-chevron { color: var(--accent); }

.card-body {
  max-height: 600px; opacity: 1;
  padding: 0 18px 18px;
  transition: max-height .35s ease, opacity .25s ease, padding-bottom .35s ease;
  overflow: hidden;
}
.card-body.collapsed { max-height: 0; opacity: 0; padding-bottom: 0; }

/* ── Data rows ──────────────────────────────────────────────────────────── */
.row {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 7px 0;
  border-bottom: 1px solid var(--txt-xlo);
}
.row:last-of-type { border-bottom: none; }
.row .lbl {
  font-size: 13px; color: var(--txt-lo);
  font-weight: 400;
}
.row .val {
  font-family: var(--mono);
  font-size: 13px; color: var(--txt-md);
  font-weight: 400;
}

.cdiv { height: 1px; background: var(--txt-xlo); margin: 12px 0 10px; }

/* ── Buttons ────────────────────────────────────────────────────────────── */
.btns { display: flex; flex-wrap: wrap; gap: 7px; }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: transparent;
  border: 1px solid var(--txt-xlo);
  color: var(--txt-lo);
  padding: 7px 13px; border-radius: var(--r-sm);
  cursor: pointer;
  font: 500 13px/1 var(--sans);
  letter-spacing: .01em;
  transition: background .18s, border-color .18s, color .18s;
  white-space: nowrap;
}
.btn .material-icons-round { font-size: 15px; }
.btn:hover {
  background: rgba(59,143,212,.08);
  border-color: var(--accent-dim);
  color: var(--txt-md);
}
.btn.active {
  background: rgba(59,143,212,.12);
  border-color: var(--accent);
  color: var(--accent);
}
.btn.active:hover { background: rgba(59,143,212,.18); }

.nav-hint {
  margin-top: 12px;
  font-size: 11px; color: var(--txt-xlo);
  letter-spacing: .06em;
  font-family: var(--mono);
}

/* ── Tooltip ────────────────────────────────────────────────────────────── */
#cell-tip {
  position: fixed; pointer-events: none; z-index: 30;
  background: var(--surface);
  border: 1px solid var(--border-h);
  border-radius: var(--r);
  padding: 16px 20px;
  opacity: 0; transition: opacity .12s ease;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  white-space: nowrap;
  min-width: 210px;
  box-shadow: var(--shadow);
}
#cell-tip.show { opacity: 1; }

.tip-label {
  font-size: 10px; letter-spacing: .14em; color: var(--txt-lo);
  text-transform: uppercase; margin-bottom: 6px;
  font-family: var(--mono);
}
.tip-energy-val {
  font-family: var(--mono);
  font-size: 26px; font-weight: 500;
  color: var(--txt-hi); line-height: 1.1;
}
.tip-energy-unit {
  font-family: var(--mono);
  font-size: 11px; color: var(--txt-lo);
  margin-top: 3px; margin-bottom: 14px;
}
.tip-div { height: 1px; background: var(--txt-xlo); margin: 12px 0; }
.tip-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px 12px; }
.tip-field label {
  display: block;
  font-size: 10px; letter-spacing: .12em;
  color: var(--txt-lo); text-transform: uppercase;
  margin-bottom: 4px; font-family: var(--mono);
}
.tip-field span {
  font-family: var(--mono);
  font-size: 14px; color: var(--txt-md);
}

/* ── Threshold panel ────────────────────────────────────────────────────── */
#thr-panel {
  position: fixed; right: 24px; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; align-items: center; gap: 14px;
  opacity: .1; transition: opacity .4s ease;
  z-index: 5; padding: 14px 8px;
}
#thr-panel:hover { opacity: 1; }

.thr-lbl {
  font-family: var(--mono);
  font-size: 9px; letter-spacing: .16em; color: var(--txt-lo);
  text-transform: uppercase;
  writing-mode: vertical-rl; transform: rotate(180deg);
}
.slider-wrap {
  height: 240px; width: 36px;
  position: relative; flex-shrink: 0;
}
#thr-slider {
  width: 240px;
  position: absolute; left: 50%; top: 50%;
  transform: translate(-50%,-50%) rotate(-90deg);
  -webkit-appearance: none; appearance: none;
  height: 3px; border-radius: 2px; outline: none; cursor: pointer;
  background: linear-gradient(90deg, var(--txt-xlo), var(--accent));
}
#thr-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);
  box-shadow: 0 0 14px rgba(59,143,212,.7);
  cursor: pointer;
  transition: transform .15s ease;
}
#thr-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }
#thr-slider::-moz-range-thumb {
  width: 18px; height: 18px; border-radius: 50%;
  background: var(--accent);
  border: 2px solid var(--bg);
  box-shadow: 0 0 14px rgba(59,143,212,.7);
  cursor: pointer;
}
#thr-val {
  font-family: var(--mono);
  font-size: 9px; color: var(--txt-lo);
  writing-mode: vertical-rl; transform: rotate(180deg);
  letter-spacing: .03em;
}

/* ── Threshold cursor ───────────────────────────────────────────────────── */
#thr-cursor {
  position: fixed; pointer-events: none; z-index: 50;
  background: var(--surface);
  border: 1px solid var(--accent-dim);
  border-radius: var(--r-sm);
  padding: 7px 13px;
  font-family: var(--mono);
  font-size: 13px; color: var(--txt-md);
  opacity: 0; transition: opacity .08s;
  white-space: nowrap; letter-spacing: .03em;
  box-shadow: var(--shadow);
}
#thr-cursor.show { opacity: 1; }

/* ── Fine-step hint ─────────────────────────────────────────────────────── */
#thr-hint {
  font-family: var(--mono);
  font-size: 9px; color: var(--txt-xlo);
  writing-mode: vertical-rl; transform: rotate(180deg);
  letter-spacing: .05em; text-align: center;
  transition: color .2s;
}
#thr-panel:hover #thr-hint { color: var(--txt-lo); }

/* ── Cinema exit ────────────────────────────────────────────────────────── */
#cinema-exit {
  position: fixed; bottom: 26px; right: 26px;
  z-index: 20;
  opacity: 0; pointer-events: none;
  transition: opacity .5s ease;
}

/* ── Cinema mode ────────────────────────────────────────────────────────── */
body.cinema .card,
body.cinema #thr-panel  { opacity: 0 !important; pointer-events: none; }
body.cinema #cell-tip   { opacity: 0 !important; }
body.cinema #cinema-exit { opacity: .22; pointer-events: auto; }
body.cinema #cinema-exit:hover { opacity: 1; }

/* ── Subtle separator ───────────────────────────────────────────────────── */
.sep {
  font-size: 10px; letter-spacing: .08em; color: var(--txt-xlo);
  font-family: var(--mono); padding: 4px 0 2px;
}
</style>
</head>
<body>

<!-- ── Loading ────────────────────────────────────────────────────────────── -->
<div id="overlay">
  <div id="overlay-title">
    <span class="material-icons-round">radar</span>
    TILECAL VIEWER
  </div>
  <div id="overlay-msg">Iniciando…</div>
  <div id="bar"><div id="prog"></div></div>
</div>

<!-- ── HUD card ───────────────────────────────────────────────────────────── -->
<div id="hud" class="card" style="top:18px;left:18px;display:none">
  <div class="card-header" onclick="toggleCard('hud')">
    <div class="card-title">
      <span class="material-icons-round">sensors</span>ATLAS TileCal
    </div>
    <div class="card-chevron open" id="hud-chev">
      <span class="material-icons-round">expand_more</span>
    </div>
  </div>
  <div class="card-body" id="hud-body">
    <div class="row"><span class="lbl">Células totais</span><span class="val" id="s-total">–</span></div>
    <div class="row"><span class="lbl">Células ativas</span><span class="val" id="s-active">–</span></div>
    <div class="row"><span class="lbl">E min / max</span>   <span class="val" id="s-erange">–</span></div>
    <div class="row"><span class="lbl">FPS</span>           <span class="val" id="s-fps">–</span></div>
    <div class="cdiv"></div>
    <div class="btns">
      <button class="btn" id="wf-btn" onclick="toggleWf()">
        <span class="material-icons-round">grid_on</span>Wireframe
      </button>
      <button class="btn" onclick="controls.reset()" title="Reset câmera">
        <span class="material-icons-round">filter_center_focus</span>
      </button>
      <button class="btn" onclick="clearEvt()" title="Limpar evento">
        <span class="material-icons-round">layers_clear</span>
      </button>
      <button class="btn active" id="info-btn" onclick="toggleInfo()" title="Toggle info ao hover">
        <span class="material-icons-round">info</span>
      </button>
      <button class="btn" onclick="enterCinema()" title="Modo cinema">
        <span class="material-icons-round">theaters</span>
      </button>
    </div>
    <div class="nav-hint">drag · scroll · R-drag</div>
  </div>
</div>

<!-- ── Event card ─────────────────────────────────────────────────────────── -->
<div id="evt" class="card" style="bottom:18px;left:18px;display:none">
  <div class="card-header" onclick="toggleCard('evt')">
    <div class="card-title">
      <span class="material-icons-round">bolt</span>Evento de Colisão
    </div>
    <div class="card-chevron open" id="evt-chev">
      <span class="material-icons-round">expand_more</span>
    </div>
  </div>
  <div class="card-body" id="evt-body">
    <div style="margin-bottom:14px">
      <button class="btn" onclick="document.getElementById('fi').click()">
        <span class="material-icons-round">upload_file</span>Carregar XML
      </button>
      <input id="fi" type="file" accept=".xml" style="display:none">
    </div>
    <div class="row"><span class="lbl">Arquivo</span>         <span class="val" id="ep-name" style="max-width:130px;overflow:hidden;text-overflow:ellipsis">–</span></div>
    <div class="row"><span class="lbl">count declarado</span> <span class="val" id="ep-cdecl">–</span></div>
    <div class="row"><span class="lbl">count real</span>      <span class="val" id="ep-cact">–</span></div>
    <div class="row"><span class="lbl">match</span>           <span class="val" id="ep-match">–</span></div>
  </div>
</div>

<!-- ── Cell tooltip ───────────────────────────────────────────────────────── -->
<div id="cell-tip">
  <div class="tip-label">Energia depositada</div>
  <div class="tip-energy-val" id="tt-e">–</div>
  <div class="tip-energy-unit">GeV</div>
  <div class="tip-div"></div>
  <div class="tip-grid">
    <div class="tip-field"><label>Eta</label><span id="tt-eta">–</span></div>
    <div class="tip-field"><label>Phi</label><span id="tt-phi">–</span></div>
    <div class="tip-field"><label>Sub</label><span id="tt-sub">–</span></div>
  </div>
</div>

<!-- ── Threshold panel ────────────────────────────────────────────────────── -->
<div id="thr-panel">
  <div class="thr-lbl">Threshold</div>
  <div class="slider-wrap">
    <input type="range" id="thr-slider" min="0" max="1" step="any" value="0">
  </div>
  <div id="thr-val">–</div>
  <div id="thr-hint">scroll = fine</div>
</div>
<div id="thr-cursor"></div>

<!-- ── Cinema exit ────────────────────────────────────────────────────────── -->
<div id="cinema-exit">
  <button class="btn" onclick="exitCinema()">
    <span class="material-icons-round">close</span>Sair do cinema
  </button>
</div>

<!-- ── Three.js importmap ─────────────────────────────────────────────────── -->
<script type="importmap">
{
  "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE        from 'three';
import { GLTFLoader }    from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import init, { load_cgv, process_event } from './wasm/pkg/tile_viz.js';

// ── Renderer ──────────────────────────────────────────────────────────────────
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

// ── Scene ─────────────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x030b17);
scene.add(new THREE.AmbientLight(0xffffff, 1.3));
const sun = new THREE.DirectionalLight(0xffffff, 1.7);
sun.position.set(1, 2, 1.5); scene.add(sun);
const fill = new THREE.DirectionalLight(0x8899ff, 0.5);
fill.position.set(-1, -1, -1); scene.add(fill);

// ── Camera + Controls ──────────────────────────────────────────────────────────
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 1, 1e6);
camera.position.set(0, 2000, 6000);
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
window.controls = controls;

// ── Global state ───────────────────────────────────────────────────────────────
const meshIndex  = {};
let hitMats      = [];
let wfMode       = false;
let infoEnabled  = true;

const meshHitData = new Map();  // mesh → {e_mev, eta, phi, sub}
let allHits       = [];         // [{mesh, e_mev}]
let visibleList   = [];
let eMin_mev = 0, eMax_mev = 1;

let hoveredMesh  = null;
let outlineClone = null;

const baseMat = new THREE.MeshStandardMaterial({
  color: 0x0a1828, roughness: 0.72, metalness: 0.08, side: THREE.DoubleSide,
});

const outlineMat = new THREE.MeshBasicMaterial({
  color: 0x00e5ff, side: THREE.BackSide,
});

// ── Colormap (stellar) ────────────────────────────────────────────────────────
function stellarColor(e_mev) {
  const range = eMax_mev - eMin_mev;
  const t = range > 1e-10 ? Math.max(0, Math.min(1, (e_mev - eMin_mev) / range)) : 0.5;
  const stops = [
    { t: 0.00, r: 0.60, g: 0.00, b: 0.08 },
    { t: 0.26, r: 1.00, g: 0.42, b: 0.00 },
    { t: 0.50, r: 1.00, g: 0.96, b: 0.55 },
    { t: 0.74, r: 0.38, g: 0.68, b: 1.00 },
    { t: 1.00, r: 0.00, g: 0.08, b: 1.00 },
  ];
  let i = 0;
  while (i < stops.length - 2 && t > stops[i + 1].t) i++;
  const a = stops[i], b = stops[i + 1];
  const s = (b.t - a.t) > 1e-10 ? (t - a.t) / (b.t - a.t) : 0;
  return { r: a.r + s*(b.r-a.r), g: a.g + s*(b.g-a.g), b: a.b + s*(b.b-a.b) };
}

// ── Card collapse ──────────────────────────────────────────────────────────────
window.toggleCard = id => {
  document.getElementById(id + '-body').classList.toggle('collapsed');
  document.getElementById(id + '-chev').classList.toggle('open');
};

// ── Wireframe ──────────────────────────────────────────────────────────────────
window.toggleWf = () => {
  wfMode = !wfMode;
  hitMats.forEach(m => m.wireframe = wfMode);
  const btn = document.getElementById('wf-btn');
  btn.innerHTML = wfMode
    ? '<span class="material-icons-round">view_in_ar</span>Solid'
    : '<span class="material-icons-round">grid_on</span>Wireframe';
};

// ── Clear event ────────────────────────────────────────────────────────────────
window.clearEvt = () => {
  setHovered(null);
  Object.values(meshIndex).forEach(m => { m.visible = false; m.material = baseMat; });
  meshHitData.clear(); allHits = []; hitMats = []; visibleList = [];
  eMin_mev = 0; eMax_mev = 1;
  document.getElementById('s-active').textContent  = '0';
  document.getElementById('s-erange').textContent  = '–';
  document.getElementById('ep-name').textContent   = '–';
  document.getElementById('ep-cdecl').textContent  = '–';
  document.getElementById('ep-cact').textContent   = '–';
  document.getElementById('ep-match').textContent  = '–';
  document.getElementById('thr-val').textContent   = '–';
  const sl = document.getElementById('thr-slider');
  sl.min = 0; sl.max = 1; sl.value = 0;
};

// ── Toggle info ────────────────────────────────────────────────────────────────
window.toggleInfo = () => {
  infoEnabled = !infoEnabled;
  const btn = document.getElementById('info-btn');
  const ico = btn.querySelector('.material-icons-round');
  btn.classList.toggle('active', infoEnabled);
  ico.textContent = infoEnabled ? 'info' : 'info_outline';

  if (!infoEnabled) {
    clearOutline();
    cellTip.classList.remove('show');
  } else if (hoveredMesh && meshHitData.has(hoveredMesh)) {
    showOutline(hoveredMesh);
    fillTooltip(meshHitData.get(hoveredMesh));
    placeTooltip(mouseX, mouseY);
    cellTip.classList.add('show');
  }
};

// ── Cinema ─────────────────────────────────────────────────────────────────────
window.enterCinema = () => {
  setHovered(null);
  document.body.classList.add('cinema');
  controls.autoRotate = true;
  controls.autoRotateSpeed = 0.85;
};
window.exitCinema = () => {
  document.body.classList.remove('cinema');
  controls.autoRotate = false;
};

// ── Outline ────────────────────────────────────────────────────────────────────
function showOutline(mesh) {
  clearOutline();
  outlineClone = new THREE.Mesh(mesh.geometry, outlineMat);
  outlineClone.scale.setScalar(1.04);
  outlineClone.layers.set(1);
  mesh.add(outlineClone);
}
function clearOutline() {
  if (outlineClone) {
    if (outlineClone.parent) outlineClone.parent.remove(outlineClone);
    outlineClone = null;
  }
}

// ── Hover state ────────────────────────────────────────────────────────────────
function setHovered(mesh) {
  if (mesh === hoveredMesh) return;

  // restore previous
  if (hoveredMesh) {
    clearOutline();
    if (hoveredMesh.material !== baseMat)
      hoveredMesh.material.emissiveIntensity = 1;
    cellTip.classList.remove('show');
  }

  hoveredMesh = mesh;
  if (!mesh) return;

  const data = meshHitData.get(mesh);
  if (!data) return;

  // Always illuminate on hover
  if (mesh.material !== baseMat)
    mesh.material.emissiveIntensity = 3.5;

  // Outline + tooltip only when info is enabled
  if (infoEnabled) {
    showOutline(mesh);
    fillTooltip(data);
    placeTooltip(mouseX, mouseY);
    cellTip.classList.add('show');
  }
}

// ── Tooltip ────────────────────────────────────────────────────────────────────
const cellTip = document.getElementById('cell-tip');

function fillTooltip(data) {
  document.getElementById('tt-e').textContent   = (data.e_mev / 1000).toFixed(4);
  document.getElementById('tt-eta').textContent = data.eta.toFixed(4);
  document.getElementById('tt-phi').textContent = data.phi.toFixed(4);
  document.getElementById('tt-sub').textContent = data.sub.toFixed(0);
}
function placeTooltip(x, y) {
  const w    = cellTip.offsetWidth || 220;
  const flip = x + w + 26 > innerWidth;
  cellTip.style.left      = (flip ? x - w - 22 : x + 22) + 'px';
  cellTip.style.top       = y + 'px';
  cellTip.style.transform = 'translateY(-50%)';
}

// ── Threshold ──────────────────────────────────────────────────────────────────
const thrSlider  = document.getElementById('thr-slider');
const thrValEl   = document.getElementById('thr-val');
const thrCursor  = document.getElementById('thr-cursor');
let   thrDragging = false;

function applyThreshold(thr_mev) {
  for (const h of allHits) h.mesh.visible = h.e_mev >= thr_mev;
  visibleList = allHits.filter(h => h.mesh.visible).map(h => h.mesh);
  if (hoveredMesh && !hoveredMesh.visible) setHovered(null);
  mouseDirty = true;
  document.getElementById('s-active').textContent = visibleList.length.toLocaleString();
}

function formatThrDisplay(mev) {
  const gev = mev / 1000;
  thrValEl.textContent = gev < 0.001 ? gev.toExponential(2) : gev.toFixed(4);
}

thrSlider.addEventListener('mousedown', () => {
  thrDragging = true;
  thrCursor.classList.add('show');
});
document.addEventListener('mouseup', () => {
  if (thrDragging) { thrDragging = false; thrCursor.classList.remove('show'); }
});

thrSlider.addEventListener('input', () => {
  const mev = parseFloat(thrSlider.value);
  formatThrDisplay(mev);
  thrCursor.textContent = (mev / 1000).toFixed(6) + ' GeV';
  applyThreshold(mev);
});

// Scroll wheel on the panel for fine-grained control
document.getElementById('thr-panel').addEventListener('wheel', e => {
  e.preventDefault();
  if (!allHits.length) return;
  const range  = eMax_mev - eMin_mev;
  // shift = coarse (1%), default = fine (0.05%)
  const step   = e.shiftKey ? range * 0.01 : range * 0.0005;
  const cur    = parseFloat(thrSlider.value);
  const next   = Math.min(eMax_mev, Math.max(eMin_mev, cur + (e.deltaY > 0 ? step : -step)));
  thrSlider.value = next;
  formatThrDisplay(next);
  thrCursor.textContent = (next / 1000).toFixed(6) + ' GeV';
  applyThreshold(next);
}, { passive: false });

// ── Mouse / raycasting ──────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const mouseNDC  = new THREE.Vector2(-9999, -9999);
let   mouseX    = 0, mouseY = 0, mouseDirty = false;

window.addEventListener('mousemove', e => {
  mouseNDC.x =  (e.clientX / innerWidth)  * 2 - 1;
  mouseNDC.y = -(e.clientY / innerHeight) * 2 + 1;
  mouseX = e.clientX; mouseY = e.clientY;
  mouseDirty = true;

  if (hoveredMesh && infoEnabled && !document.body.classList.contains('cinema'))
    placeTooltip(mouseX, mouseY);

  if (thrDragging) {
    thrCursor.style.left = (mouseX + 20) + 'px';
    thrCursor.style.top  = (mouseY - 14) + 'px';
  }
});

function updateHover() {
  if (!mouseDirty || document.body.classList.contains('cinema')) return;
  mouseDirty = false;
  if (!visibleList.length) { setHovered(null); return; }
  raycaster.setFromCamera(mouseNDC, camera);
  const hits = raycaster.intersectObjects(visibleList, false);
  setHovered(hits.length ? hits[0].object : null);
}

// ── Init ───────────────────────────────────────────────────────────────────────
async function initApp() {
  const msg  = document.getElementById('overlay-msg');
  const prog = document.getElementById('prog');

  msg.textContent = 'Carregando WASM…';
  await init();
  prog.style.width = '20%';

  msg.textContent = 'Carregando geometria…';
  const [glbBuf, cgvText] = await Promise.all([
    fetch('./root_file/CaloGeometry.glb').then(r => r.arrayBuffer()),
    fetch('./root_file/CaloGeometry.cgv').then(r => r.text()),
  ]);
  prog.style.width = '60%';

  msg.textContent = 'Indexando células…';
  const cellCount = load_cgv(cgvText);
  prog.style.width = '70%';

  msg.textContent = 'Construindo cena…';
  const gltf = await new Promise((res, rej) => new GLTFLoader().parse(glbBuf, '', res, rej));
  gltf.scene.traverse(obj => {
    if (!obj.isMesh) return;
    obj.material = baseMat;
    obj.visible  = false;
    meshIndex[obj.userData.name ?? obj.name] = obj;
  });
  scene.add(gltf.scene);
  prog.style.width = '90%';

  const box    = new THREE.Box3().setFromObject(gltf.scene);
  const size   = box.getSize(new THREE.Vector3()).length();
  const center = box.getCenter(new THREE.Vector3());
  controls.target.copy(center);
  camera.position.copy(center).addScalar(size * 0.9);
  camera.near = size * 0.001;
  camera.far  = size * 20;
  camera.updateProjectionMatrix();
  controls.update();

  prog.style.width = '100%';
  await new Promise(r => setTimeout(r, 200));

  document.getElementById('s-total').textContent  = cellCount.toLocaleString();
  document.getElementById('s-active').textContent = '0';
  document.getElementById('overlay').style.display = 'none';
  document.getElementById('hud').style.display     = 'block';
  document.getElementById('evt').style.display     = 'block';
}

// ── XML upload ─────────────────────────────────────────────────────────────────
document.getElementById('fi').onchange = async e => {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('ep-name').textContent = file.name;

  const result = JSON.parse(process_event(await file.text()));
  if (!result.ok) { alert('Erro: ' + result.error); return; }

  document.getElementById('ep-cdecl').textContent = result.count_declared;
  document.getElementById('ep-cact').textContent  = result.count_actual;
  document.getElementById('ep-match').textContent = result.count_ok ? 'sim' : 'não';

  eMin_mev = result.e_min;
  eMax_mev = result.e_max;
  document.getElementById('s-erange').textContent =
    `${(eMin_mev/1000).toFixed(2)} / ${(eMax_mev/1000).toFixed(2)} GeV`;

  // Reset scene
  setHovered(null);
  Object.values(meshIndex).forEach(m => { m.visible = false; m.material = baseMat; });
  meshHitData.clear(); allHits = []; hitMats = []; visibleList = [];

  // Slider range (MeV internally, display GeV)
  thrSlider.min   = eMin_mev;
  thrSlider.max   = eMax_mev;
  thrSlider.value = eMin_mev;
  formatThrDisplay(eMin_mev);

  // Build hit meshes
  let _found = 0, _miss = 0;
  const _missEx = {};   // count missing by Tile volume prefix
  for (const h of result.hits) {
    const key  = h.path.replace(/\t→\t/g, '→');
    const mesh = meshIndex[key] ?? meshIndex[h.path];
    if (!mesh) {
      _miss++;
      const vol = key.split('→')[1] ?? 'unknown';
      _missEx[vol] = (_missEx[vol] ?? 0) + 1;
      continue;
    }
    _found++;

    mesh.visible = true;
    const col = stellarColor(h.energy);
    const mat = new THREE.MeshStandardMaterial({
      color:     new THREE.Color(col.r, col.g, col.b),
      emissive:  new THREE.Color(col.r * 0.4, col.g * 0.4, col.b * 0.4),
      emissiveIntensity: 1,
      roughness: 0.32, metalness: 0.18, side: THREE.DoubleSide,
    });
    mesh.material = mat;
    hitMats.push(mat);
    meshHitData.set(mesh, { e_mev: h.energy, eta: h.eta, phi: h.phi, sub: h.sub });
    allHits.push({ mesh, e_mev: h.energy });
  }

  visibleList = allHits.map(h => h.mesh);
  document.getElementById('s-active').textContent = visibleList.length.toLocaleString();
  console.log(`[mesh] found=${_found}  missing=${_miss}`);
  if (_miss > 0) console.log('[mesh] missing by volume:', _missEx);
  // Log first example of a missing and found path for quick visual check
  const _eg = result.hits.find(h => !meshIndex[h.path.replace(/\t→\t/g,'→')] && !meshIndex[h.path]);
  if (_eg) console.log('[mesh] example MISSING path:', JSON.stringify(_eg.path));
};

// ── Resize ─────────────────────────────────────────────────────────────────────
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// ── Render loop ────────────────────────────────────────────────────────────────
let fc = 0, ft = 0;
(function animate(t) {
  requestAnimationFrame(animate);
  controls.update();
  updateHover();
  renderer.render(scene, camera);
  fc++;
  if (t - ft >= 1000) {
    document.getElementById('s-fps').textContent = fc;
    fc = 0; ft = t;
  }
})(0);

initApp().catch(err => {
  document.getElementById('overlay-msg').textContent = 'Erro: ' + err.message;
  console.error(err);
});
</script>
