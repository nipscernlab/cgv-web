<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ATLAS Detector ID Parser — CERN</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #0a0a12;
      color: #e0e8ff;
      min-height: 100vh;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid #2a3060;
    }

    header h1 { font-size: 1.6rem; color: #7ab8ff; letter-spacing: 0.12em; text-transform: uppercase; }
    header p  { margin-top: 0.4rem; color: #607090; font-size: 0.85rem; }

    .panel { max-width: 860px; margin: 0 auto; }

    .input-row {
      display: flex; gap: 0.75rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1rem;
    }

    .input-group {
      display: flex; flex-direction: column; gap: 0.3rem; flex: 1; min-width: 220px;
    }

    label {
      font-size: 0.75rem; color: #8090c0; text-transform: uppercase; letter-spacing: 0.08em;
    }

    input {
      background: #12182a; border: 1px solid #2a3a60; color: #c8d8ff;
      padding: 0.6rem 0.8rem; font-family: inherit; font-size: 1rem;
      border-radius: 4px; width: 100%; outline: none; transition: border-color 0.2s;
    }
    input:focus { border-color: #4a7aff; }

    button {
      background: #1a3a8a; color: #b0d0ff; border: 1px solid #3a5aaa;
      padding: 0.6rem 1.5rem; font-family: inherit; font-size: 0.95rem;
      border-radius: 4px; cursor: pointer; transition: background 0.15s; white-space: nowrap;
    }
    button:hover { background: #2a4aaa; }

    #examples {
      display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 1.5rem; align-items: center;
    }

    #examples .lbl { font-size: 0.72rem; color: #607090; margin-right: 0.2rem; }

    .example-btn {
      background: #0e1520; border: 1px solid #2a3a60; color: #8090c0;
      padding: 0.3rem 0.6rem; font-family: inherit; font-size: 0.75rem;
      border-radius: 3px; cursor: pointer; transition: all 0.15s;
    }
    .example-btn:hover { background: #172030; color: #a0b8e0; border-color: #3a5a80; }

    #output {
      background: #0d1220; border: 1px solid #2a3060; border-radius: 6px;
      padding: 1.5rem; min-height: 200px;
    }

    .result-header {
      display: flex; align-items: baseline; gap: 1rem; flex-wrap: wrap;
      margin-bottom: 1.2rem; padding-bottom: 0.8rem; border-bottom: 1px solid #1e2a50;
    }

    .subsystem-badge {
      font-size: 0.9rem; font-weight: bold; padding: 0.2rem 0.7rem;
      border-radius: 3px; letter-spacing: 0.1em;
    }
    .badge-TILECAL  { background:#1a3820; color:#60e080; border:1px solid #2a5830; }
    .badge-lar-em   { background:#2a1a30; color:#d070ff; border:1px solid #4a2a60; }
    .badge-lar-hec  { background:#302010; color:#ffb040; border:1px solid #604020; }
    .badge-lar-fcal { background:#1a2838; color:#60b8ff; border:1px solid #2a4860; }
    .badge-error    { background:#2a1010; color:#ff6060; border:1px solid #602020; }

    .cell-name { font-size: 1.3rem; color: #ffffff; font-weight: bold; }
    .full-id   { font-size: 0.85rem; color: #607090; margin-left: auto; }

    .fields-table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; font-size: 0.88rem; }
    .fields-table th {
      text-align: left; color: #5068a0; font-weight: normal; padding: 0.25rem 0.6rem;
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.07em;
      border-bottom: 1px solid #1e2a50;
    }
    .fields-table td { padding: 0.35rem 0.6rem; border-bottom: 1px solid #141e38; }
    .field-name  { color: #6080c0; }
    .field-value { color: #ffd060; font-weight: bold; }
    .field-label { color: #8090b0; font-size: 0.82rem; }

    .coords-block {
      display: flex; gap: 2rem; flex-wrap: wrap; margin-top: 0.8rem;
      padding: 0.8rem 1rem; background: #080e1c; border-radius: 4px; border: 1px solid #1e2a50;
    }
    .coord { display: flex; flex-direction: column; gap: 0.2rem; }
    .coord-label { font-size: 0.7rem; color: #5068a0; text-transform: uppercase; letter-spacing: 0.1em; }
    .coord-value { font-size: 1.3rem; color: #80e8ff; font-weight: bold; }

    .summary-pre {
      margin-top: 1.5rem; padding: 1rem; background: #060c18;
      border: 1px solid #1e2a50; border-radius: 4px; white-space: pre-wrap;
      font-size: 0.82rem; color: #7090b8; line-height: 1.7;
    }

    .placeholder { color: #2a3a60; font-size: 0.9rem; text-align: center; padding: 3rem 0; }
    .error-msg { color: #ff6060; padding: 1rem; background: #1a0808; border-radius: 4px; border: 1px solid #4a1010; }

    .bit-viz {
      margin-bottom: 1.5rem; padding: 1rem; background: #070d1a;
      border: 1px solid #1e2a50; border-radius: 4px; overflow-x: auto;
    }
    .bit-viz-title { font-size: 0.7rem; color: #5068a0; text-transform: uppercase; margin-bottom: 0.6rem; }
    .bit-row { display: flex; gap: 2px; font-size: 0.7rem; }
    .bit-cell {
      display: flex; flex-direction: column; align-items: center;
      min-width: 14px; padding: 1px 0;
    }
    .bit-val { color: #ffd060; }
    .bit-pos { color: #2a4060; font-size: 0.6rem; }
    .bit-field-bar {
      display: flex; gap: 2px; margin-top: 4px;
    }
    .bit-seg {
      height: 6px; border-radius: 2px; flex: 1;
    }
  </style>
</head>
<body>

<header>
  <h1>ATLAS Detector ID Parser</h1>
  <p>CERN · ATLANTIS event display · Compact 64-bit cell identifier decoder · Rust/WASM</p>
</header>

<div class="panel">

  <div class="input-row">
    <div class="input-group">
      <label>64-bit Cell ID (decimal)</label>
      <input id="id-input" type="text" value="4899916394579099648"
             placeholder="e.g. 4899916394579099648" />
    </div>
    <button id="decode-btn">DECODE ▶</button>
  </div>

  <div id="examples"><span class="lbl">Examples:</span></div>

  <div id="output">
    <div class="placeholder">Enter a 64-bit ATLAS cell ID and press DECODE</div>
  </div>
</div>

<script type="module">
import init, { parse_atlas_id, example_ids } from '../pkg/atlas_id_parser.js';

// Declared before await so they are initialized when decode() runs
const FIELD_COLORS = [
  '#3a6090','#604090','#406040','#906040','#409080','#904060','#808040','#408090'
];

await init();

// Populate example buttons from WASM
const exContainer = document.getElementById('examples');
const examples = example_ids();
for (const ex of examples) {
  const btn = document.createElement('button');
  btn.className = 'example-btn';
  btn.textContent = ex.id.slice(0, 6) + '… ' + ex.label.split('(')[0].trim();
  btn.title = ex.label + '\nID: ' + ex.id;
  btn.addEventListener('click', () => {
    document.getElementById('id-input').value = ex.id;
    decode();
  });
  exContainer.appendChild(btn);
}

// Auto-decode default
decode();

function decode() {
  const idStr = document.getElementById('id-input').value.trim();
  if (!idStr) return;
  const result = parse_atlas_id(idStr);
  renderResult(result);
}

document.getElementById('decode-btn').addEventListener('click', decode);
document.getElementById('id-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') decode();
});

// ── Rendering ────────────────────────────────────────────────────────────────

function badgeClass(sub) {
  if (!sub) return 'badge-error';
  const s = sub.toLowerCase();
  if (s.includes('tile')) return 'badge-TILECAL';
  if (s.includes('hec'))  return 'badge-lar-hec';
  if (s.includes('fcal')) return 'badge-lar-fcal';
  if (s.includes('em'))   return 'badge-lar-em';
  return 'badge-error';
}

function renderBitViz(idStr, fields) {
  let idBig;
  try { idBig = BigInt(idStr); } catch { return ''; }

  // Build 64-bit binary string
  let bin = idBig.toString(2).padStart(64, '0');

  // Calculate bit widths per field for TILE layout (hardcoded for readability)
  // This is purely visual — the actual decoding is done in Rust
  const segments = [
    { name: 'subdet', bits: 3 }, { name: 'section', bits: 3 },
    { name: 'side',   bits: 4 }, { name: 'module',  bits: 8 },
    { name: 'tower',  bits: 6 }, { name: 'sampling',bits: 4 },
    { name: 'pmt',    bits: 2 }, { name: 'adc',     bits: 2 },
    { name: '(zero)', bits: 32 }
  ];

  let bitCells = '';
  for (let i = 0; i < 64; i++) {
    const pos = 63 - i;  // bit position (63=MSB)
    bitCells += `<div class="bit-cell">
      <span class="bit-val">${bin[i]}</span>
      <span class="bit-pos">${pos}</span>
    </div>`;
  }

  let offset = 0;
  let bars = '';
  segments.forEach((seg, ci) => {
    const color = FIELD_COLORS[ci % FIELD_COLORS.length];
    bars += `<div class="bit-seg" style="background:${color};width:${seg.bits * 16 + (seg.bits-1)*2}px;" title="${seg.name} (${seg.bits} bits)"></div>`;
    offset += seg.bits;
  });

  return `<div class="bit-viz">
    <div class="bit-viz-title">Bit layout (bit 63 → 0)</div>
    <div class="bit-row">${bitCells}</div>
    <div class="bit-field-bar" style="margin-top:4px">${bars}</div>
  </div>`;
}

function renderResult(r) {
  const out = document.getElementById('output');

  if (!r.valid) {
    out.innerHTML = `<div class="error-msg">⚠ ${esc(r.error)}</div>`;
    return;
  }

  const badge  = `<span class="subsystem-badge ${badgeClass(r.subsystem)}">${esc(r.subsystem)}</span>`;
  const cname  = `<span class="cell-name">${esc(r.cell_name)}</span>`;
  const fullid = `<span class="full-id">full: ${esc(r.full_id)}</span>`;

  const rows = r.fields.map((f, i) =>
    `<tr>
       <td class="field-name" style="border-left:3px solid ${FIELD_COLORS[i % FIELD_COLORS.length]};padding-left:8px">${esc(f.name)}</td>
       <td class="field-value">${f.value}</td>
       <td class="field-label">${esc(f.label)}</td>
     </tr>`
  ).join('');

  const etaStr  = r.eta.toFixed(4);
  const phiRad  = r.phi.toFixed(4);
  const phiDeg  = (r.phi * 180 / Math.PI).toFixed(2);

  out.innerHTML = `
    <div class="result-header">${badge} ${cname} ${fullid}</div>
    ${renderBitViz(r.id, r.fields)}
    <table class="fields-table">
      <thead><tr><th>Field</th><th>Value</th><th>Description</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="coords-block">
      <div class="coord">
        <span class="coord-label">η (pseudorapidity)</span>
        <span class="coord-value">${etaStr}</span>
      </div>
      <div class="coord">
        <span class="coord-label">φ (azimuthal)</span>
        <span class="coord-value">${phiRad} rad</span>
      </div>
      <div class="coord">
        <span class="coord-label">φ in degrees</span>
        <span class="coord-value">${phiDeg}°</span>
      </div>
    </div>
    <pre class="summary-pre">${esc(r.summary)}</pre>
  `;
}

function esc(s) {
  if (typeof s !== 'string') s = String(s ?? '');
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
